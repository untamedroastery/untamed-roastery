// ─── HELPERS ───
function fmtW(g){ return g>=1000?`${(g/1000).toFixed(2)}kg`:`${Math.round(g)}g`; }
function fmtT(m){ if(!m&&m!==0)return"—"; const h=Math.floor(m/60),r=m%60; return h>0?`${h}h ${r}m`:`${r}m`; }
function md(s){ return s.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>"); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"}); }
function fmtDateFull(ts){ return new Date(ts).toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
function toYMD(ts){ const d=new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function calcOrder(order){
  const level = ROAST_LEVELS.find(r=>r.id===order.roastLevel)||ROAST_LEVELS[2];
  const loss = order.customLoss!=null ? order.customLoss/100 : level.loss;
  const slots = order.slots||[];
  const roastedCap = slots.reduce((s,sl)=>{
    const m = MACHINES.find(x=>x.id===sl.id)||MACHINES[0];
    return s + (m.capacity||0)*sl.qty*(1-loss);
  },0);
  const slowRT = slots.length>0 ? Math.max(...slots.map(sl=>{ const m=MACHINES.find(x=>x.id===sl.id)||MACHINES[0]; return m.rt?.[order.roastLevel]||12; })) : 12;
  const slowCool = slots.length>0 ? Math.max(...slots.map(sl=>{ const m=MACHINES.find(x=>x.id===sl.id)||MACHINES[0]; return m.cool||6; })) : 6;
  const rounds = roastedCap>0 ? Math.ceil(order.grams/roastedCap) : 0;
  const totalTime = rounds*(slowRT+slowCool);
  const greenNeeded = order.grams/(1-loss);
  const wastage = Math.round(roastedCap*rounds - order.grams);
  return { roastedCap, slowRT, slowCool, rounds, totalTime, greenNeeded, wastage, loss };
}

// ─── ROUND ROW ───
function RoundRow({ idx,thisRoasted,maxRoasted,roastLevel,cumTime,done,onToggle,note,onNote }){
  const lvl=ROAST_LEVELS.find(r=>r.id===roastLevel);
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(note);
  const pct=Math.min((thisRoasted/maxRoasted)*100,100);
  return (
    <div style={{borderRadius:10,border:`1.5px solid ${done?"#86efac":C.tan}`,background:done?"#f0fdf4":C.white,padding:"12px 14px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onToggle} style={{width:24,height:24,borderRadius:6,border:`2px solid ${done?"#16a34a":C.tan}`,background:done?"#16a34a":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {done&&<span style={{color:"#fff",fontSize:13,fontWeight:900}}>✓</span>}
        </button>
        <div style={{fontSize:13,fontWeight:700,color:done?"#16a34a":C.espresso,minWidth:68,textDecoration:done?"line-through":"none",fontFamily:"Georgia,serif"}}>Round {idx+1}</div>
        <div style={{flex:1,height:6,background:C.cream,borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:lvl?.dot||C.red,borderRadius:3}}/>
        </div>
        <div style={{fontSize:12,color:C.espresso,minWidth:88,textAlign:"right",fontWeight:600}}>{fmtW(Math.round(thisRoasted))}</div>
        <div style={{fontSize:11,color:C.mocha,minWidth:64,textAlign:"right"}}>~{fmtT(cumTime)}</div>
        <button onClick={()=>{setEditing(v=>!v);setDraft(note);}} style={{background:note||editing?C.red+"15":"transparent",border:`1px solid ${note||editing?C.red:C.tan}`,borderRadius:6,padding:"3px 9px",cursor:"pointer",fontSize:11,color:note||editing?C.red:C.mocha}}>
          {editing?"✕":note?"📝 Note":"+ Note"}
        </button>
      </div>
      {editing&&(
        <div style={{marginTop:10,display:"flex",gap:8}}>
          <input value={draft} onChange={e=>setDraft(e.target.value)} placeholder="e.g. Adjusted airflow…"
            style={{flex:1,border:`1.5px solid ${C.red}`,borderRadius:8,padding:"7px 12px",fontSize:13,color:C.dark,background:C.cream,outline:"none",fontFamily:"Georgia,serif"}}
            onKeyDown={e=>{if(e.key==="Enter"){onNote(draft);setEditing(false);}if(e.key==="Escape")setEditing(false);}}/>
          <button onClick={()=>{onNote(draft);setEditing(false);}} style={{background:C.red,border:"none",borderRadius:8,padding:"0 16px",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"Georgia,serif"}}>Save</button>
        </div>
      )}
      {note&&!editing&&<div style={{marginTop:8,fontSize:12,color:C.espresso,background:`${C.red}12`,padding:"6px 10px",borderRadius:6,borderLeft:`3px solid ${C.red}`}}>{note}</div>}
    </div>
  );
}

function LogEntryCard({ entry, onDelete, onStatusChange, onNoteChange }){
  var useState = React.useState;
  var expanded_s = useState(false); var expanded=expanded_s[0]; var setExpanded=expanded_s[1];
  var editingNote_s = useState(false); var editingNote=editingNote_s[0]; var setEditingNote=editingNote_s[1];
  var noteDraft_s = useState(entry.orderNote||""); var noteDraft=noteDraft_s[0]; var setNoteDraft=noteDraft_s[1];
  var confirmDelete_s = useState(false); var confirmDelete=confirmDelete_s[0]; var setConfirmDelete=confirmDelete_s[1];
  var editing_s = useState(false); var editing=editing_s[0]; var setEditing=editing_s[1];
  var draft_s = useState(null); var draft=draft_s[0]; var setDraft=draft_s[1];

  var status=STATUS_OPTIONS.find(function(s){ return s.id===entry.status; })||STATUS_OPTIONS[0];

  function startEdit(){
    setDraft(Object.assign({},entry));
    setEditing(true);
    setExpanded(true);
  }
  function saveDraft(){
    onNoteChange(draft);
    setEditing(false);
    setDraft(null);
  }
  function cancelEdit(){
    setEditing(false);
    setDraft(null);
  }
  function setDraftField(field, val){ setDraft(function(d){ return Object.assign({},d,{[field]:val}); }); }

  var e = editing && draft ? draft : entry;

  return (
    <div style={{border:"1.5px solid "+C.tan,borderRadius:14,overflow:"hidden",marginBottom:10,background:C.white}}>
      <div style={{display:"flex",alignItems:"center",padding:"11px 14px",cursor:"pointer",gap:0,flexWrap:"wrap"}} onClick={function(){ setExpanded(function(v){ return !v; }); }}>
        <div style={{flex:"1 1 120px",minWidth:0}}>
          <div style={{fontWeight:700,color:editing?"#2563eb":C.dark,fontSize:13,fontFamily:"Georgia,serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.client||"—"}{editing&&" ✏️"}</div>
          <div style={{fontSize:10,color:C.mocha,marginTop:2}}>📅 {fmtDate(entry.id)}</div>
        </div>
        <div style={{flex:"0 0 auto",fontSize:12,color:C.mocha,paddingRight:8,whiteSpace:"nowrap"}}>{e.machines}</div>
        <div style={{flex:"0 0 auto",textAlign:"right",paddingRight:8}}>
          <div style={{fontSize:13,fontWeight:700,color:C.espresso}}>{fmtW(e.grams)}</div>
          <div style={{fontSize:10,color:C.mocha}}>{e.format}·{e.level}</div>
        </div>
        <div style={{flex:"0 0 auto",paddingRight:8}} onClick={function(ev){ ev.stopPropagation(); }}>
          <select value={entry.status||"pending"} onChange={function(ev){ ev.stopPropagation(); onStatusChange(ev.target.value); }}
            style={{border:"1.5px solid "+status.color,background:status.bg,color:status.color,borderRadius:20,padding:"4px 8px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",outline:"none"}}>
            {STATUS_OPTIONS.map(function(s){ return <option key={s.id} value={s.id}>{s.label}</option>; })}
          </select>
        </div>
        <div style={{flex:"0 0 auto"}} onClick={function(ev){ ev.stopPropagation(); startEdit(); }}>
          <button style={{background:"transparent",border:"1px solid "+C.tan,borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:11,color:"#2563eb",fontFamily:"Georgia,serif"}}>✏️ Edit</button>
        </div>
        <div style={{flex:"0 0 24px",textAlign:"right",fontSize:12,color:C.mocha,marginLeft:4}}>{expanded?"▲":"▼"}</div>

                  <div style={{fontSize:10,color:C.mocha,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Roast Level</div>

                    style={{width:"100%",border:"1.5px solid #2563eb",borderRadius:8,padding:"7px 10px",fontFamily:"Georgia,serif",fontSize:13,color:C.dark,background:"#fff",outline:"none",boxSizing:"border-box"}}>
                    {ROAST_LEVELS.map(function(l){ return <option key={l.id} value={l.id}>{l.label}</option>; })}

                <div>

                  <input type="number" value={draft.rounds||""} onChange={function(ev){ setDraftField("rounds",parseInt(ev.target.value)||0); }}
                    style={{width:"100%",border:"1.5px solid #2563eb",borderRadius:8,padding:"7px 10px",fontFamily:"Georgia,serif",fontSize:13,color:C.dark,background:"#fff",outline:"none",boxSizing:"border-box"}}/>
                </div>
                <div>
                  <div style={{fontSize:10,color:C.mocha,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Sell Price ($/kg)</div>
                  <input type="number" value={draft.sellPricePerKg||""} onChange={function(ev){ setDraftField("sellPricePerKg",parseFloat(ev.target.value)||0); }}
                    style={{width:"100%",border:"1.5px solid #2563eb",borderRadius:8,padding:"7px 10px",fontFamily:"Georgia,serif",fontSize:13,color:C.dark,background:"#fff",outline:"none",boxSizing:"border-box"}}/>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,color:C.mocha,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Notes</div>
                <textarea value={draft.orderNote||""} onChange={function(ev){ setDraftField("orderNote",ev.target.value); }}
                  placeholder="Delivery date, invoice #, special requests…"
                  style={{width:"100%",border:"1.5px solid #2563eb",borderRadius:8,padding:"8px 12px",fontSize:13,color:C.dark,background:"#fff",outline:"none",fontFamily:"Georgia,serif",resize:"vertical",minHeight:60,boxSizing:"border-box"}}/>

              <div style={{display:"flex",gap:8}}>
                <button onClick={saveDraft} style={{flex:1,background:"#2563eb",border:"none",borderRadius:9,padding:"10px",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"Georgia,serif"}}>Save Changes</button>
                <button onClick={cancelEdit} style={{background:C.tan,border:"none",borderRadius:9,padding:"10px 16px",color:C.espresso,cursor:"pointer",fontSize:13,fontFamily:"Georgia,serif"}}>Cancel</button>

            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:12}}>

                {l:"Green Beans Sourced",v:fmtW(e.greenNeeded)},{l:"Roast Loss",v:"~"+(e.lossPercent||16)+"%"},
                {l:"Wastage",v:fmtW(e.wastage)},{l:"Roasted At",v:fmtDateFull(entry.id)},
                {l:"Roast Time",v:fmtT(e.roastTime)},{l:"Cool Time",v:fmtT(e.coolTime)},
              ].map(function(s){ return (
                <div key={s.l} style={{background:C.white,borderRadius:10,padding:"10px 12px",border:"1px solid "+C.tan}}>
                  <div style={{fontSize:10,color:C.mocha,marginBottom:3,letterSpacing:1,textTransform:"uppercase"}}>{s.l}</div>

              ); })}

            <div style={{background:C.white,borderRadius:10,padding:"12px 14px",border:"1px solid "+C.tan,marginBottom:10}}>
              <div style={{fontSize:10,letterSpacing:2,color:C.mocha,textTransform:"uppercase",marginBottom:8}}>💰 Cost & Profitability</div>
              {entry.totalCost!=null&&(
                <div style={{background:C.espresso,borderRadius:10,padding:"10px 12px",marginBottom:10}}>
                  <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-end"}}>
                    <div><div style={{fontSize:9,color:C.tan,textTransform:"uppercase",letterSpacing:1}}>Total Cost</div><div style={{fontSize:20,fontWeight:900,color:C.cream,fontFamily:"Georgia,serif"}}>${e.totalCost.toFixed(2)}</div></div>
                    <div><div style={{fontSize:9,color:C.tan,textTransform:"uppercase",letterSpacing:1}}>Cost/kg</div><div style={{fontSize:16,fontWeight:700,color:C.peach,fontFamily:"Georgia,serif"}}>${(e.costPerKg||0).toFixed(2)}</div></div>
                  </div>
                </div>
              )}
              <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:120}}>
                  <div style={{fontSize:11,color:C.mocha,marginBottom:4}}>Sell price ($/kg)</div>
                  <input type="number" defaultValue={entry.sellPricePerKg||""} placeholder="0.00"
                    onBlur={function(ev){
                      var updated=Object.assign({},entry,{sellPricePerKg:parseFloat(ev.target.value)||0});
                      var revenue=updated.sellPricePerKg*(updated.grams/1000);
                      var cost=updated.totalCost||((updated.greenCostPerKg||0)*(updated.greenNeeded/1000));
                      updated.margin=revenue-cost;
                      onNoteChange(updated);
                    }}
                    style={{border:"1.5px solid "+C.tan,borderRadius:8,padding:"7px 10px",width:"100%",fontFamily:"Georgia,serif",fontSize:13,color:C.dark,background:C.cream,outline:"none",boxSizing:"border-box"}}/>
                </div>
                {entry.sellPricePerKg&&<div style={{flex:1,minWidth:100}}><div style={{fontSize:11,color:C.mocha,marginBottom:4}}>Revenue</div><div style={{fontSize:15,fontWeight:700,color:C.espresso,fontFamily:"Georgia,serif"}}>${((entry.sellPricePerKg||0)*(entry.grams/1000)).toFixed(2)}</div></div>}
                {entry.margin!=null&&<div style={{flex:1,minWidth:100}}><div style={{fontSize:11,color:C.mocha,marginBottom:4}}>Margin</div><div style={{fontSize:20,fontWeight:900,color:entry.margin>=0?"#16a34a":"#dc2626",fontFamily:"Georgia,serif"}}>{entry.margin>=0?"+":""}${entry.margin.toFixed(2)}</div></div>}
              </div>
            </div>
          )}

          {!editing&&(
            <div style={{background:C.white,borderRadius:10,padding:"12px 14px",border:"1px solid "+C.tan,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:10,letterSpacing:2,color:C.mocha,textTransform:"uppercase"}}>📋 Notes</div>
                {!editingNote&&<button onClick={function(){ setEditingNote(true); }} style={{background:"transparent",border:"1px solid "+C.tan,borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:11,color:C.mocha,fontFamily:"Georgia,serif"}}>{entry.orderNote?"Edit":"+ Add note"}</button>}
              </div>
              {editingNote
                ? <div style={{display:"flex",gap:8}}>
                    <textarea value={noteDraft} onChange={function(ev){ setNoteDraft(ev.target.value); }} placeholder="Delivery date, invoice #, special requests…"
                      style={{flex:1,border:"1.5px solid "+C.red,borderRadius:8,padding:"8px 12px",fontSize:13,color:C.dark,background:C.cream,outline:"none",fontFamily:"Georgia,serif",resize:"vertical",minHeight:60}}/>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      <button onClick={function(){ onNoteChange(Object.assign({},entry,{orderNote:noteDraft})); setEditingNote(false); }} style={{background:C.red,border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif"}}>Save</button>
                      <button onClick={function(){ setEditingNote(false); }} style={{background:C.tan,border:"none",borderRadius:8,padding:"8px 14px",color:C.espresso,cursor:"pointer",fontSize:12,fontFamily:"Georgia,serif"}}>Cancel</button>
                    </div>
                  </div>
                : entry.orderNote
                  ? <div style={{fontSize:13,color:C.espresso,lineHeight:1.6,borderLeft:"3px solid "+C.red,paddingLeft:10}}>{entry.orderNote}</div>
                  : <div style={{fontSize:12,color:C.mocha,fontStyle:"italic"}}>No notes added</div>
              }
            </div>
          )}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <button onClick={function(){
              var e=entry;
              var d=new Date(e.id);
              var kg=(e.grams/1000);
              var ch=typeof CHANNELS!=="undefined"?CHANNELS.find(function(c){ return c.id===(e.channel||"retail"); }):null;
              var sellPricePerKg=e.sellPricePerKg||0;
              var revenue=sellPricePerKg*kg;
              var cost=e.totalCost||0;
              var profit=revenue-cost;
              var marginPct=revenue>0?((profit/revenue)*100).toFixed(1):"";
              var roundRows=[];
              var rt=e.roastTime&&e.rounds?Math.round(e.roastTime/e.rounds):12;
              var ct=e.coolTime&&e.rounds?Math.round(e.coolTime/e.rounds):6;
              for(var i=0;i<(e.rounds||0);i++){
                roundRows.push(["Round "+(i+1), rt+"min roast", ct+"min cool", (rt+ct)+"min total"]);
              }
              var lines=[
                ["UNTAMED ROASTERY — SESSION DETAIL REPORT"],
                [""],
                ["Date", d.toLocaleDateString()],
                ["Time", d.toLocaleTimeString()],
                ["Client / Order", e.client||"—"],
                ["Channel", ch?ch.label:(e.channel||"retail")],
                ["Status", e.status||"pending"],
                [""],
                ["— ROAST DETAILS —"],
                ["Machine(s)", e.machines||""],
                ["Bean Origin", e.beanOrigin||"—"],
                ["Roast Level", e.level||""],
                ["Format", e.format||""],
                [""],
                ["— VOLUME —"],
                ["Roasted Weight", (e.grams||0)+"g / "+kg.toFixed(3)+"kg"],
                ["Green Beans Needed", (e.greenNeeded||0)+"g"],
                ["Wastage", (e.wastage||0)+"g"],
                ["Roast Loss", (e.lossPercent||16)+"%"],
                [""],
                ["— TIMING —"],
                ["Total Rounds", e.rounds||0],
                ["Roast Time", (e.roastTime||0)+"min"],
                ["Cool Time", (e.coolTime||0)+"min"],
                ["Total Time", (e.totalTime||0)+"min"],
                [""],
                ["— FINANCIALS —"],
                ["Green Bean Cost", cost>0?"$"+cost.toFixed(2):"—"],
                ["Sell Price", sellPricePerKg>0?"$"+sellPricePerKg.toFixed(2)+"/kg":"—"],
                ["Revenue", revenue>0?"$"+revenue.toFixed(2):"—"],
                ["Gross Profit", revenue>0?"$"+profit.toFixed(2):"—"],
                ["Margin %", marginPct?marginPct+"%":"—"],
                [""],
                ["— ROUND BREAKDOWN —"],
                ["Round", "Roast", "Cool", "Round Total"],
              ].concat(roundRows).concat([
                [""],
                ["— NOTES —"],
                [e.orderNote||"(no notes)"],
              ]);
              var csv=lines.map(function(r){ return r.map(function(v){ return '"'+String(v||"").replace(/"/g,'""')+'"'; }).join(","); }).join("\n");
              var a=document.createElement("a");
              a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
              a.download="session-"+(e.client||"order").replace(/\s+/g,"-").toLowerCase()+"-"+d.toISOString().slice(0,10)+".csv";
              a.click();
            }} style={{background:"transparent",border:"1px solid "+C.tan,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:11,color:C.mocha,fontFamily:"Georgia,serif"}}>
              ↓ Export Session
            </button>
            {confirmDelete
              ? <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#dc2626"}}>Delete this order?</span>
                  <button onClick={onDelete} style={{background:"#dc2626",border:"none",borderRadius:8,padding:"6px 16px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif"}}>Yes, delete</button>
                  <button onClick={function(){ setConfirmDelete(false); }} style={{background:C.tan,border:"none",borderRadius:8,padding:"6px 16px",color:C.espresso,cursor:"pointer",fontSize:12,fontFamily:"Georgia,serif"}}>Cancel</button>
                </div>
              : <button onClick={function(){ setConfirmDelete(true); }} style={{background:"transparent",border:"1px solid #fca5a5",borderRadius:8,padding:"6px 16px",color:"#dc2626",cursor:"pointer",fontSize:12,fontFamily:"Georgia,serif"}}>🗑 Delete</button>
            }
          </div>
        </div>
      )}
    </div>
  );
}


// ─── CALENDAR TAB ───
function CalendarTab({ log, schedule, onScheduleChange }){
  const today = new Date();
  const [viewDate, setViewDate] = useState({ year:today.getFullYear(), month:today.getMonth() });
  const [calView, setCalView] = useState("month"); // "month" | "week"
  const [selectedDay, setSelectedDay] = useState(null);
  const [showScheduler, setShowScheduler] = useState(false);
  const [schedForm, setSchedForm] = useState({ client:"", grams:"", unit:"g", roastLevel:"medium", format:"drip", slots:[], scheduledDate:"" });
  const [pickerOpen, setPickerOpen] = useState(false);

  // Build a map of YMD -> [entries]
  const dayMap = {};
  [...log, ...schedule].forEach(e=>{
    const key = toYMD(e.scheduledDate||e.id);
    if(!dayMap[key]) dayMap[key]=[];
    dayMap[key].push(e);
  });

  // Month view helpers
  const { year, month } = viewDate;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayYMD = toYMD(Date.now());

  function prevMonth(){ setViewDate(v=>{ const d=new Date(v.year,v.month-1,1); return {year:d.getFullYear(),month:d.getMonth()}; }); setSelectedDay(null); }
  function nextMonth(){ setViewDate(v=>{ const d=new Date(v.year,v.month+1,1); return {year:d.getFullYear(),month:d.getMonth()}; }); setSelectedDay(null); }

  // Week helpers
  function getWeekStart(d=new Date()){
    const s=new Date(d); s.setDate(d.getDate()-d.getDay()); s.setHours(0,0,0,0); return s;
  }
  const [weekStart, setWeekStart] = useState(()=>getWeekStart());
  const weekDays = Array.from({length:7},(_,i)=>{ const d=new Date(weekStart); d.setDate(d.getDate()+i); return d; });

  function addSchedSlot(id){ setSchedForm(f=>({...f,slots:[...f.slots,{id,qty:1}]})); setPickerOpen(false); }
  function removeSchedSlot(i){ setSchedForm(f=>({...f,slots:f.slots.filter((_,j)=>j!==i)})); }
  function setSchedQty(i,q){ setSchedForm(f=>({...f,slots:f.slots.map((s,j)=>j===i?{...s,qty:Math.max(1,q)}:s)})); }

  function saveScheduled(){
    if(!schedForm.scheduledDate||!schedForm.grams||schedForm.slots.length===0) return;
    const grams = schedForm.unit==="kg" ? parseFloat(schedForm.grams)*1000 : parseFloat(schedForm.grams);
    const entry = {
      id: Date.now(),
      scheduledDate: new Date(schedForm.scheduledDate+"T08:00:00").getTime(),
      client: schedForm.client,
      grams,
      roastLevel: schedForm.roastLevel,
      format: schedForm.format,
      slots: schedForm.slots,
      status: "pending",
      isScheduled: true,
      machines: schedForm.slots.map(s=>{ const m=MACHINES.find(x=>x.id===s.id)||MACHINES[0]; return `${s.qty}× ${m.model}`; }).join(", "),
      level: ROAST_LEVELS.find(r=>r.id===schedForm.roastLevel)?.label,
      ...calcOrder({...schedForm,grams}),
    };
    onScheduleChange([...schedule, entry]);
    setShowScheduler(false);
    setSchedForm({client:"",grams:"",unit:"g",roastLevel:"medium",format:"drip",slots:[],scheduledDate:""});
  }

  function deleteScheduled(id){ onScheduleChange(schedule.filter(e=>e.id!==id)); }

  const DayDot = ({entry})=>{
    const isLog = !entry.isScheduled;
    const lvlColor = LEVEL_COLORS[entry.roastLevel]||C.tan;
    const statusC = STATUS_OPTIONS.find(s=>s.id===entry.status)||STATUS_OPTIONS[0];
    return (
      <div style={{fontSize:10,background:isLog?statusC.bg:`${C.red}15`,border:`1px solid ${isLog?statusC.color:C.red}`,borderRadius:6,padding:"2px 5px",marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%",display:"flex",alignItems:"center",gap:3}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:lvlColor,flexShrink:0}}/>
        <span style={{color:isLog?statusC.color:C.red,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis"}}>{entry.client||"Order"}</span>
        {isLog&&<span style={{color:C.mocha}}>✓</span>}
      </div>
    );
  };

  const DayDetail = ({ymd})=>{
    const entries = dayMap[ymd]||[];
    if(!entries.length) return <div style={{fontSize:12,color:C.mocha,fontStyle:"italic",textAlign:"center",padding:"20px 0"}}>No roasts scheduled for this day</div>;
    return entries.map((e,i)=>{
      const calc = e.isScheduled ? e : calcOrder({...e,roastLevel:e.roastLevel||"medium",slots:[]});
      const isLog = !e.isScheduled;
      const statusC = STATUS_OPTIONS.find(s=>s.id===e.status)||STATUS_OPTIONS[0];
      const lvlColor = LEVEL_COLORS[e.roastLevel||"medium"]||C.tan;
      return (
        <div key={i} style={{border:`1.5px solid ${isLog?statusC.color:C.red}`,borderRadius:12,padding:"12px 14px",marginBottom:10,background:isLog?statusC.bg+"44":`${C.red}08`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                <div style={{width:9,height:9,borderRadius:"50%",background:lvlColor}}/>
                <span style={{fontWeight:700,fontSize:14,color:C.dark,fontFamily:"Georgia,serif"}}>{e.client||"—"}</span>
                {isLog&&<span style={{fontSize:10,background:statusC.bg,color:statusC.color,border:`1px solid ${statusC.color}`,borderRadius:20,padding:"1px 8px",fontWeight:700}}>{statusC.label}</span>}
                {e.isScheduled&&<span style={{fontSize:10,background:`${C.red}20`,color:C.red,border:`1px solid ${C.red}`,borderRadius:20,padding:"1px 8px",fontWeight:700}}>Scheduled</span>}
              </div>
              <div style={{fontSize:11,color:C.mocha}}>{e.machines}</div>
            </div>
            {e.isScheduled&&<button onClick={()=>deleteScheduled(e.id)} style={{background:"#fee2e2",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,color:"#dc2626",fontFamily:"Georgia,serif"}}>Remove</button>}
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[{l:"Amount",v:fmtW(e.grams)},{l:"Rounds",v:e.rounds||"—"},{l:"Total Time",v:fmtT(e.totalTime)},{l:"Green Beans",v:fmtW(e.greenNeeded||0)},{l:"Level",v:e.level||e.roastLevel},{l:"Format",v:e.format}].map(s=>(
              <div key={s.l} style={{background:"rgba(255,255,255,0.8)",border:`1px solid ${C.tan}`,borderRadius:8,padding:"5px 10px"}}>
                <div style={{fontSize:9,color:C.mocha,textTransform:"uppercase",letterSpacing:1}}>{s.l}</div>
                <div style={{fontSize:12,fontWeight:700,color:C.espresso}}>{s.v}</div>
              </div>
            ))}
          </div>
        </div>
      );
    });
  };

  const totalScheduled = schedule.length;
  const upcomingKg = schedule.reduce((s,e)=>s+(e.grams/1000),0);

  return (
    <div style={{maxWidth:1040,margin:"0 auto",padding:"28px 24px"}}>
      
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}}>
        {[
          {icon:"📅",label:"Scheduled Roasts",value:totalScheduled,color:C.red},
          {icon:"🌱",label:"Upcoming Volume",value:`${upcomingKg.toFixed(1)}kg`,color:C.espresso},
          {icon:"📦",label:"Logged Orders",value:log.length,color:"#16a34a"},
        ].map(s=>(
          <div key={s.label} style={{background:"rgba(255,255,255,0.85)",border:`1.5px solid ${C.tan}`,borderRadius:14,padding:"16px 18px",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:28}}>{s.icon}</div>
            <div>
              <div style={{fontSize:10,letterSpacing:2,color:C.mocha,textTransform:"uppercase",marginBottom:3}}>{s.label}</div>
              <div style={{fontSize:24,fontWeight:900,color:s.color,fontFamily:"Georgia,serif"}}>{s.value}</div>
            </div>
          </div>
        ))}
      </div>

      
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {calView==="month"?(
            <>

// ─── PACKAGING SET ROW (controlled inputs to avoid onBlur issues) ───
function PkgSetRow({ pkg, setPackagingInv }){
  const [stockDraft, setStockDraft] = useState("");
  const [alertDraft, setAlertDraft] = useState(String(pkg.lowAlert));

  function commitStock(){
    const val = parseInt(stockDraft);
    if(!isNaN(val) && stockDraft!==""){
      setPackagingInv(p=>p.map(pk=>pk.id===pkg.id?{...pk,stock:Math.max(0,val)}:pk));
      setStockDraft("");
    }
  }
  function commitAlert(){
    const val = parseInt(alertDraft);
    if(!isNaN(val)){
      setPackagingInv(p=>p.map(pk=>pk.id===pkg.id?{...pk,lowAlert:Math.max(0,val)}:pk));
    }
  }

  return (
    <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2}}>
      <span style={{fontSize:10,color:"#997C6F",whiteSpace:"nowrap"}}>Set stock:</span>
      <input
        type="number" min="0" value={stockDraft} placeholder={String(pkg.stock)}
        onChange={e=>setStockDraft(e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter") commitStock(); }}
        onBlur={commitStock}
        style={{flex:1,border:"1.5px solid #D1BA9B",borderRadius:7,padding:"5px 8px",fontFamily:"Georgia,serif",fontSize:12,color:"#0C0C0C",background:"#F0E4CC",outline:"none"}}/>
      <button onClick={commitStock}
        style={{background:"#D95035",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:11,color:"#F0E4CC",fontFamily:"Georgia,serif",fontWeight:700,whiteSpace:"nowrap"}}>
        Set
      </button>
      <span style={{fontSize:10,color:"#997C6F",whiteSpace:"nowrap"}}>alert:</span>
      <input
        type="number" min="0" value={alertDraft}
        onChange={e=>setAlertDraft(e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter") commitAlert(); }}
        onBlur={commitAlert}
        style={{width:54,border:"1.5px solid #D1BA9B",borderRadius:7,padding:"5px 8px",fontFamily:"Georgia,serif",fontSize:12,color:"#0C0C0C",background:"#F0E4CC",outline:"none"}}/>
    </div>
  );
}

// ─── INVENTORY TAB ───
function InventoryTab({ inventory, setInventory, log, beanCatalog, setBeanCatalog, packagingInv, setPackagingInv }){
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({origin:"",supplier:"",processing:"",stockG:"",unit:"kg",costPerKg:"",lowAlertKg:"",notes:""});
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [confirmDeleteBean, setConfirmDeleteBean] = useState(null);
  const [beanSearch, setBeanSearch] = useState("");
  const [showDropdown, setShowDropdown] = useState(false);
  const [isCustomBean, setIsCustomBean] = useState(false);
  const [manageCatalog, setManageCatalog] = useState(false);

  // All known origins (catalog + already in inventory)
  const allOrigins = beanCatalog;
  const filtered = allOrigins.filter(b =>
    !beanSearch || b.name.toLowerCase().includes(beanSearch.toLowerCase()) ||
    (b.supplier||"").toLowerCase().includes(beanSearch.toLowerCase())
  );

  function selectBean(bean){
    setForm(f=>({...f, origin:bean.name, supplier:bean.supplier||"", processing:bean.processing||"", costPerKg:bean.costPerKg||""}));
    setBeanSearch(bean.name);
    setShowDropdown(false);
    setIsCustomBean(false);
  }

  function openAdd(){
    setForm({origin:"",supplier:"",processing:"",stockG:"",unit:"kg",costPerKg:"",lowAlertKg:"",notes:""});
    setBeanSearch(""); setEditId(null); setIsCustomBean(false); setShowAdd(true);
  }

  function openEdit(item){
    setForm({origin:item.origin,supplier:item.supplier||"",processing:item.processing||"",stockG:item.unit==="kg"?(item.stockG/1000):item.stockG,unit:item.unit||"kg",costPerKg:item.costPerKg||"",lowAlertKg:item.lowAlertKg||"",notes:item.notes||""});
    setBeanSearch(item.origin); setEditId(item.id); setIsCustomBean(false); setShowAdd(true);
  }

  function saveItem(){
    if(!form.origin||!form.stockG) return;
    const stockG = form.unit==="kg" ? parseFloat(form.stockG)*1000 : parseFloat(form.stockG);
    const item = { id:editId||Date.now(), origin:form.origin, supplier:form.supplier, processing:form.processing, stockG, unit:form.unit, costPerKg:parseFloat(form.costPerKg)||0, lowAlertKg:parseFloat(form.lowAlertKg)||0, notes:form.notes };
    if(editId) setInventory(p=>p.map(x=>x.id===editId?item:x));
    else setInventory(p=>[...p,item]);
    // If it's a new custom bean not in catalog, save to catalog
    const inCatalog = beanCatalog.some(b=>b.name.toLowerCase()===form.origin.toLowerCase());
    if(!inCatalog && form.origin){
      const newBean = { id:`custom-${Date.now()}`, name:form.origin, supplier:form.supplier, processing:form.processing, costPerKg:parseFloat(form.costPerKg)||0 };
      setBeanCatalog(p=>[...p, newBean]);
    }
    setShowAdd(false); setEditId(null);
  }

  function adjustStock(id, deltaG){
    setInventory(p=>p.map(x=>x.id===id?{...x,stockG:Math.max(0,x.stockG+deltaG)}:x));
  }

  function deleteBeanFromCatalog(beanId){
    setBeanCatalog(p=>p.filter(b=>b.id!==beanId));
    setConfirmDeleteBean(null);
  }

  const totalStockKg = inventory.reduce((s,x)=>s+(x.stockG/1000),0);
  const totalValue   = inventory.reduce((s,x)=>s+(x.stockG/1000)*(x.costPerKg||0),0);

              </div>
            </div>
            <button onClick={saveItem} style={{width:"100%",padding:"13px",background:(!form.origin||!form.stockG)?C.tan:C.red,color:C.cream,border:"none",borderRadius:12,fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,cursor:(!form.origin||!form.stockG)?"not-allowed":"pointer"}}>
              {editId?"Save Changes →":"Add to Inventory →"}

    </div>
  );

const SL = ({children,style={}}) => <div style={{fontSize:10,letterSpacing:3,color:C.mocha,textTransform:"uppercase",marginBottom:10,fontFamily:"Georgia,serif",...style}}>{children}</div>;

// ─── MULTI-TRACK SESSION ───────────────────────────────────────────
function MultiTrackSession({ inventory, onSaveSession, persistedTracks, onTracksChange, sessionName, onSessionNameChange, globalTimer, onTimerChange, sessionRunning, onSessionRunningChange, savedTrackIds, onSavedTrackIdsChange }){
  var useState = React.useState;
  var useEffect = React.useEffect;
  var C2 = {cream:"#F0E4CC",red:"#D95035",dark:"#0C0C0C",tan:"#D1BA9B",mocha:"#997C6F",espresso:"#47322F",white:"#FFFFFF"};
  var TRACK_COLORS = ["#D95035","#2563eb","#16a34a","#7c3aed","#d97706","#0891b2"];

  function newTrack(){ return {id:Date.now()+Math.random(),machineId:"",beanId:"",roastLevel:"medium",gramsInput:"",gramsUnit:"g",grams:0,roundStates:{},notes:""}; }

  // Use persisted state from parent (survives tab switches)
  var tracks = persistedTracks || [newTrack(),newTrack()];
  function setTracks(fn){ var next = typeof fn==="function" ? fn(tracks) : fn; onTracksChange(next); }

  // Timer effect
  useEffect(function(){
    if(!sessionRunning) return;
    var t = setInterval(function(){ onTimerChange(function(s){ return s+1; }); }, 1000);
    return function(){ clearInterval(t); };
  }, [sessionRunning]);

  // Initialize tracks if null
  useEffect(function(){
    if(persistedTracks===null){ onTracksChange([newTrack(),newTrack()]); }
  }, []);

  function fmtSec(s){ var m=Math.floor(s/60),sec=s%60; return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0"); }
  function updateTrack(id,updates){ setTracks(function(p){ return p.map(function(t){ return t.id===id?Object.assign({},t,updates):t; }); }); }
  function removeTrack(id){ setTracks(function(p){ return p.filter(function(t){ return t.id!==id; }); }); }
  function addTrack(){ setTracks(function(p){ return [...p,newTrack()]; }); }
  function toggleRound(trackId,roundIdx,wasDone){
    setTracks(function(p){ return p.map(function(t){
      if(t.id!==trackId) return t;
      var rs=Object.assign({},t.roundStates||{});
      if(wasDone){ delete rs[roundIdx]; } else { rs[roundIdx]=Date.now(); }
      return Object.assign({},t,{roundStates:rs});
    }); });
  }

  var totalGreen = tracks.reduce(function(s,t){
    var lv=ROAST_LEVELS.find(function(r){ return r.id===t.roastLevel; })||ROAST_LEVELS[2];
    return s+(t.grams>0?t.grams/(1-lv.loss):0);
  },0);

  function buildEntry(t){
    var m=MACHINES.find(function(x){ return x.id===t.machineId; });
    var lv=ROAST_LEVELS.find(function(r){ return r.id===t.roastLevel; })||ROAST_LEVELS[2];
    var loss=lv.loss;
    var cap=m?m.capacity*(1-loss):0;
    var rounds=cap>0?Math.ceil(t.grams/cap):0;
    var rt=m?(m.rt?.[t.roastLevel]||12):12;
    var cool=m?(m.cool||6):6;
    var bean=inventory.find(function(b){ return b.id===t.beanId; })||null;
    return {
      id:Date.now()+Math.random(),
      client:sessionName||"Multi-track Session",
      grams:t.grams,roastLevel:t.roastLevel,level:lv.label,
      machines:m?"1× "+m.model:"Unknown",
      rounds,totalTime:rounds*(rt+cool),roastTime:rounds*rt,coolTime:rounds*cool,
      greenNeeded:Math.ceil(t.grams/(1-loss)),
      wastage:Math.round(cap*rounds-t.grams),
      format:"whole",status:"pending",orderNote:t.notes||"",channel:"retail",marginPct:75,
      beanOrigin:bean?bean.origin:null,beanOriginId:t.beanId||null,
      sessionDuration:globalTimer,isMultiTrack:true,
    };
  }

  function saveTrack(track){
    onSaveSession([buildEntry(track)]);
    onSavedTrackIdsChange(function(p){ return p.includes(track.id)?p:[...p,track.id]; });
  }

  function saveAllUnsaved(){
    var unsaved=tracks.filter(function(t){ return t.grams>0&&t.machineId&&!(Array.isArray(savedTrackIds)&&savedTrackIds.includes(t.id)); });
    onSaveSession(unsaved.map(buildEntry));
    onSavedTrackIdsChange(function(p){ var newIds=unsaved.map(function(t){ return t.id; }); return [...p,...newIds.filter(function(id){ return !p.includes(id); })]; });

  var readyTracks = tracks.filter(function(t){ return t.grams>0&&t.machineId; });

  return (

          <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:180}}>
            <span style={{fontSize:16}}>⚡</span>
            <input value={sessionName} onChange={function(e){ onSessionNameChange(e.target.value); }} placeholder="Session name e.g. Feb 25 AM"
              style={{flex:1,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(240,228,204,0.25)",borderRadius:8,padding:"7px 11px",color:C2.cream,fontFamily:"Georgia,serif",fontSize:12,outline:"none"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontFamily:"monospace",fontSize:20,color:sessionRunning?C2.red:C2.mocha,fontWeight:700,minWidth:56,textAlign:"center"}}>{fmtSec(globalTimer)}</div>
            <button onClick={function(){ onSessionRunningChange(function(v){ return !v; }); }}
              style={{background:sessionRunning?"#fee2e2":C2.red,color:sessionRunning?"#dc2626":C2.cream,border:"none",borderRadius:9,padding:"8px 14px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>

            </button>
          </div>
        </div>
      </div>

      {tracks.map(function(track,idx){
        var m=MACHINES.find(function(x){ return x.id===track.machineId; });
        var lv=ROAST_LEVELS.find(function(r){ return r.id===(track.roastLevel||"medium"); })||ROAST_LEVELS[2];
        var loss=lv.loss;
        var grams=track.grams||0;
        var cap=m?m.capacity*(1-loss):0;
        var rounds=cap>0?Math.ceil(grams/cap):0;
        var rt=m?(m.rt?.[track.roastLevel||"medium"]||12):12;
        var cool=m?(m.cool||6):6;
        var totalTime=rounds*(rt+cool);
        var greenNeeded=grams>0?grams/(1-loss):0;
        var bean=inventory.find(function(b){ return b.id===track.beanId; })||null;
        var doneCount=Object.keys(track.roundStates||{}).length;
        var color=TRACK_COLORS[idx%TRACK_COLORS.length];
        var isSaved=Array.isArray(savedTrackIds)&&savedTrackIds.includes(track.id);
        // Feature 2: remaining time
        var timePerRound=rt+cool;
        var remainingRounds=rounds-doneCount;

        return (
          <div key={track.id} style={{border:"2px solid "+color+"35",borderRadius:14,background:"rgba(255,255,255,0.92)",overflow:"hidden",marginBottom:12}}>
            <div style={{background:color+"10",borderBottom:"1px solid "+color+"20",padding:"9px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:10}}>

                    style={{width:"100%",border:"1.5px solid "+(track.machineId?color:C2.tan),borderRadius:9,padding:"8px 9px",fontFamily:"Georgia,serif",fontSize:12,color:C2.dark,background:C2.white,outline:"none",boxSizing:"border-box"}}>

                  <div style={{display:"flex",gap:4}}>
                    <input type="number" placeholder="e.g. 2000" value={track.gramsInput||""} onChange={function(e){
                      var raw=e.target.value;

                    <div style={{display:"flex",background:C2.white,borderRadius:8,overflow:"hidden",border:"1px solid "+C2.tan,flexShrink:0}}>
                      {["g","kg"].map(function(u){ return (

                        }} style={{padding:"0 8px",background:(track.gramsUnit||"g")===u?color:"transparent",color:(track.gramsUnit||"g")===u?"#fff":C2.mocha,border:"none",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11}}>{u}</button>
                      ); })}
                    </div>
                  </div>
                </div>
                <div>
                  <div style={{fontSize:10,letterSpacing:1.5,color:C2.mocha,textTransform:"uppercase",marginBottom:5}}>Bean Origin</div>
                  <select value={track.beanId||""} onChange={function(e){ updateTrack(track.id,{beanId:e.target.value}); }}
                    style={{width:"100%",border:"1.5px solid "+(track.beanId?color:C2.tan),borderRadius:9,padding:"8px 9px",fontFamily:"Georgia,serif",fontSize:12,color:C2.dark,background:C2.white,outline:"none",boxSizing:"border-box"}}>
                    <option value="">Select bean…</option>
                    {inventory.map(function(b){ return <option key={b.id} value={b.id}>{b.origin} ({(b.stockG/1000).toFixed(1)}kg)</option>; })}
                  </select>
                </div>
              </div>

              {grams>0&&m&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
                  {[
                    {l:"Rounds",v:rounds+""},
                    {l:"Total Time",v:fmtT(totalTime)},
                    {l:"Green",v:fmtW(Math.ceil(greenNeeded))},
                  ].map(function(s){ return (
                    <div key={s.l} style={{background:C2.white,border:"1px solid "+C2.tan,borderRadius:8,padding:"5px 6px",textAlign:"center"}}>
                      <div style={{fontSize:9,color:C2.mocha,textTransform:"uppercase",letterSpacing:1}}>{s.l}</div>
                      <div style={{fontSize:13,fontWeight:700,color:color,fontFamily:"Georgia,serif"}}>{s.v}</div>
                    </div>
                  ); })}
                </div>
              )}

              {rounds>0&&(
                <div style={{background:C2.cream,borderRadius:10,padding:10,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:10,color:C2.mocha,textTransform:"uppercase",letterSpacing:1.5}}>Round Tracker</span>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{fontSize:11,color:C2.mocha}}><b style={{color:doneCount===rounds&&rounds>0?"#16a34a":color}}>{doneCount}</b>/{rounds}</span>
                      {remainingTime>0&&(
                        <span style={{fontSize:11,fontWeight:700,color:color,background:color+"15",border:"1px solid "+color+"30",borderRadius:20,padding:"2px 9px",whiteSpace:"nowrap"}}>
                          ⏱ {fmtT(remainingTime)} left
                        </span>
                      )}
                      {doneCount===rounds&&rounds>0&&<span style={{fontSize:13}}>🎉</span>}
                    </div>
                  </div>
                  {Array.from({length:rounds}).map(function(_,i){
                    var done=!!(track.roundStates||{})[i];
                    return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <button onClick={function(){ toggleRound(track.id,i,done); }}
                          style={{width:22,height:22,borderRadius:6,border:"2px solid "+(done?"#16a34a":color),background:done?"#16a34a":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {done&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
                        </button>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                            <span style={{fontSize:11,color:done?"#16a34a":C2.espresso,textDecoration:done?"line-through":"none"}}>Round {i+1}</span>
                            <span style={{fontSize:10,color:C2.mocha}}>{done?"done":fmtT((i+1-doneCount)*timePerRound)+" rem."}</span>
                          </div>
                          <div style={{height:4,background:"rgba(0,0,0,0.06)",borderRadius:2,overflow:"hidden"}}>
                            <div style={{height:"100%",width:done?"100%":"0%",background:color,borderRadius:2,transition:"width 0.3s"}}/>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,letterSpacing:1.5,color:C2.mocha,textTransform:"uppercase",marginBottom:5}}>Notes</div>
                <textarea value={track.notes||""} onChange={function(e){ updateTrack(track.id,{notes:e.target.value}); }}
                  placeholder="Client name, delivery date, special instructions…"
                  style={{width:"100%",border:"1.5px solid "+C2.tan,borderRadius:9,padding:"8px 10px",fontFamily:"Georgia,serif",fontSize:12,color:C2.dark,background:C2.white,outline:"none",resize:"vertical",minHeight:48,boxSizing:"border-box"}}/>
              </div>

              <div>
                {isSaved
                  ? <div style={{padding:"9px 14px",background:"#dcfce7",border:"1px solid #86efac",borderRadius:9,color:"#16a34a",fontSize:12,fontFamily:"Georgia,serif",fontWeight:700,textAlign:"center"}}>✓ Saved to Order Log</div>
                  : <button onClick={function(){ saveTrack(track); }} disabled={!(grams>0&&m)} style={{width:"100%",padding:"9px 14px",background:(grams>0&&m)?color:"#ccc",color:"#fff",border:"none",borderRadius:9,cursor:(grams>0&&m)?"pointer":"default",fontFamily:"Georgia,serif",fontSize:12,fontWeight:700}}>Save Track {idx+1} to Order Log</button>
                }
              </div>
            </div>
          </div>
        );
      })}

      <button onClick={addTrack} style={{width:"100%",padding:11,border:"2px dashed "+C2.tan,borderRadius:12,background:"transparent",cursor:"pointer",color:C2.mocha,fontFamily:"Georgia,serif",fontSize:13,marginBottom:12}}>
        + Add Another Track
      </button>

      {readyTracks.length>0&&(
        <div style={{background:C2.espresso,borderRadius:12,padding:"11px 14px",marginBottom:12,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {[{l:"Tracks",v:readyTracks.length},{l:"Total Green",v:fmtW(Math.ceil(totalGreen))},{l:"Session",v:fmtSec(globalTimer)}].map(function(s){ return (
              <div key={s.l} style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:C2.mocha,letterSpacing:2,textTransform:"uppercase"}}>{s.l}</div>
                <div style={{fontSize:16,fontWeight:700,color:C2.cream,fontFamily:s.l==="Session"?"monospace":"Georgia,serif"}}>{s.v}</div>
              </div>
            ); })}
          </div>
          <div style={{fontSize:11,color:C2.mocha,fontStyle:"italic"}}>{savedTrackIds.length}/{readyTracks.length} saved</div>
        </div>
      )}

      {unsavedCount>0&&(
        <button onClick={saveAllUnsaved} style={{width:"100%",padding:14,background:"#D95035",color:"#F0E4CC",border:"none",borderRadius:12,fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,cursor:"pointer",letterSpacing:1}}>
          Save All Unsaved ({unsavedCount}) →
        </button>
      )}
    </div>
  );
}



// ════════════════ FINANCE TAB ════════════════
function FinanceTab({ log, inventory }){
  var useState = React.useState;
  var C = {cream:"#F0E4CC",red:"#D95035",dark:"#0C0C0C",tan:"#D1BA9B",mocha:"#997C6F",espresso:"#47322F",white:"#FFFFFF",peach:"#E3A88E",green:"#16a34a",blue:"#2563eb"};

  // Filters
  var df = useState(""); var dateFrom=df[0]; var setDateFrom=df[1];
  var dt = useState(""); var dateTo=dt[0]; var setDateTo=dt[1];
  var cf = useState("all"); var channelFilter=cf[0]; var setChannelFilter=cf[1];
  var pf = useState("all"); var productFilter=pf[0]; var setProductFilter=pf[1];
  var sf = useState("date-desc"); var sortBy=sf[0]; var setSortBy=sf[1];

  // Filter log to completed/in-progress entries with cost data
  var allEntries = log.filter(function(e){ return e.grams>0; });

  var filtered = allEntries.filter(function(e){
    if(channelFilter!=="all" && (e.channel||"retail")!==channelFilter) return false;
    if(productFilter!=="all"){
      var fmt=(e.format||"").toLowerCase();
      var ch=(e.channel||"retail");
      var key=ch+"-"+fmt;
      if(productFilter!==key && productFilter!==fmt) return false;
    }
    if(dateFrom){ var d=new Date(e.id); var f=new Date(dateFrom); if(d<f) return false; }
    if(dateTo){ var d2=new Date(e.id); var t2=new Date(dateTo); t2.setHours(23,59,59); if(d2>t2) return false; }
    return true;
  });

  // Sort
  filtered = filtered.slice().sort(function(a,b){
    if(sortBy==="date-desc") return b.id-a.id;
    if(sortBy==="date-asc") return a.id-b.id;
    if(sortBy==="revenue-desc") return ((b.sellPricePerKg||0)*(b.grams/1000)) - ((a.sellPricePerKg||0)*(a.grams/1000));
    if(sortBy==="margin-desc") return (b.margin||0)-(a.margin||0);
    if(sortBy==="weight-desc") return b.grams-a.grams;
    return 0;
  });

  // Compute per-entry financials
  function entryFinance(e){
    var kg = e.grams/1000;
    var mPct = e.marginPct!=null ? e.marginPct : (e.channel==="wholesale"?40:e.channel==="flavor"?33:75);
    var greenCost = (e.greenCostPerKg||0)*(e.greenNeeded/1000);
    var totalCost = e.totalCost!=null ? e.totalCost : greenCost;
    var sellPricePerKg = e.sellPricePerKg;
    // If no sell price set, auto-calculate from cost + margin
    if(!sellPricePerKg && totalCost>0 && kg>0){
      var costPerKg = totalCost/kg;
      sellPricePerKg = costPerKg / (1 - mPct/100);
    }
    var revenue = (sellPricePerKg||0)*kg;
    var margin = revenue - totalCost;
    var marginPct = revenue>0 ? (margin/revenue)*100 : 0;
    var wasteCost = (e.greenCostPerKg||0)*((e.wastage||0)/1000);
    return { greenCost, totalCost, revenue, margin, marginPct, wasteCost, sellPricePerKg: sellPricePerKg||0 };
  }

  // Aggregates
  var totals = filtered.reduce(function(acc,e){
    var f=entryFinance(e);
    acc.revenue += f.revenue;
    acc.cost += f.totalCost;
    acc.margin += f.margin;
    acc.greenCost += f.greenCost;
    acc.wasteCost += f.wasteCost;
    acc.kg += e.grams/1000;
    acc.entries++;
    return acc;
  },{revenue:0,cost:0,margin:0,greenCost:0,wasteCost:0,kg:0,entries:0});

  var overallMarginPct = totals.revenue>0 ? (totals.margin/totals.revenue)*100 : 0;

  // Channel breakdown
  var channelBreakdown = CHANNELS.map(function(ch){
    var ces = filtered.filter(function(e){ return (e.channel||"retail")===ch.id; });
    var rev = ces.reduce(function(s,e){ return s+entryFinance(e).revenue; },0);
    var cost = ces.reduce(function(s,e){ return s+entryFinance(e).totalCost; },0);
    var margin = rev-cost;
    var kg = ces.reduce(function(s,e){ return s+e.grams/1000; },0);
    return { id:ch.id, label:ch.label, icon:ch.icon, count:ces.length, rev, cost, margin, kg,
      marginPct: rev>0?(margin/rev)*100:0 };
  }).filter(function(c){ return c.count>0; });

  // Product breakdown (channel + format combos)
  var productBreakdown = [];
  CHANNELS.forEach(function(ch){
    FORMATS.forEach(function(fmt){
      var pes = filtered.filter(function(e){ return (e.channel||"retail")===ch.id && (e.format||"").toLowerCase().includes(fmt.id); });
      if(pes.length===0) return;
      var rev = pes.reduce(function(s,e){ return s+entryFinance(e).revenue; },0);
      var cost = pes.reduce(function(s,e){ return s+entryFinance(e).totalCost; },0);
      var kg = pes.reduce(function(s,e){ return s+e.grams/1000; },0);
      var margin = rev-cost;
      productBreakdown.push({ label:ch.label+" "+fmt.label, icon:ch.icon+" "+fmt.icon, count:pes.length, rev, cost, margin, kg, marginPct:rev>0?(margin/rev)*100:0 });
    });
  });

  // Top clients
  var clientMap = {};
  filtered.forEach(function(e){
    var k=e.client||"Unknown";
    if(!clientMap[k]) clientMap[k]={client:k,revenue:0,orders:0,kg:0};
    var f=entryFinance(e);
    clientMap[k].revenue+=f.revenue;
    clientMap[k].orders++;
    clientMap[k].kg+=e.grams/1000;
  });
  var topClients = Object.values(clientMap).sort(function(a,b){ return b.revenue-a.revenue; }).slice(0,8);

  // Monthly trend (last 12 months)
  var monthlyMap = {};
  filtered.forEach(function(e){
    var d=new Date(e.id);
    var key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    if(!monthlyMap[key]) monthlyMap[key]={month:key,revenue:0,cost:0,kg:0};
    var f=entryFinance(e);
    monthlyMap[key].revenue+=f.revenue;
    monthlyMap[key].cost+=f.totalCost;
    monthlyMap[key].kg+=e.grams/1000;
  });
  var monthlyTrend = Object.values(monthlyMap).sort(function(a,b){ return a.month>b.month?1:-1; }).slice(-12);

  // Bean cost breakdown
  var beanCostMap = {};
  filtered.forEach(function(e){
    var k=e.beanOrigin||"Unknown";
    if(!beanCostMap[k]) beanCostMap[k]={origin:k,cost:0,kg:0,wasteCost:0};
    var f=entryFinance(e);
    beanCostMap[k].cost+=f.greenCost;
    beanCostMap[k].kg+=e.greenNeeded/1000;
    beanCostMap[k].wasteCost+=f.wasteCost;
  });
  var beanCosts = Object.values(beanCostMap).sort(function(a,b){ return b.cost-a.cost; });

  function fmt$(n){ return "$"+(n||0).toFixed(2); }
  function fmtPct(n){ return (n||0).toFixed(1)+"%"; }

  var BAR_COLORS=["#D95035","#2563eb","#16a34a","#7c3aed","#d97706","#0891b2","#db2777","#65a30d"];

  // Simple bar chart
  function BarChart({ data, valueKey, labelKey, colorFn, fmt }){
    var max = Math.max.apply(null, data.map(function(d){ return d[valueKey]||0; }));
    if(max<=0) return null;
    return (
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {data.map(function(d,i){
          var val=d[valueKey]||0;
          var pct=max>0?(val/max)*100:0;
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:"0 0 100px",fontSize:11,color:C.espresso,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d[labelKey]}</div>
              <div style={{flex:1,height:18,background:"rgba(0,0,0,0.06)",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:colorFn?colorFn(i):BAR_COLORS[i%BAR_COLORS.length],borderRadius:4,transition:"width 0.4s"}}/>
              </div>
              <div style={{flex:"0 0 70px",fontSize:11,fontWeight:700,color:C.espresso,textAlign:"right"}}>{fmt?fmt(val):val}</div>
            </div>
          );
        })}
      </div>
    );
  }

  // Revenue trend sparkline using SVG
  function SparkLine({ data }){
    if(!data||data.length<2) return <div style={{fontSize:11,color:C.mocha,fontStyle:"italic"}}>Not enough data yet</div>;
    var vals=data.map(function(d){ return d.revenue; });
    var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
    var range=max-min||1;
    var w=300,h=60,pad=4;
    var pts=vals.map(function(v,i){
      var x=pad+(i/(vals.length-1))*(w-pad*2);
      var y=pad+(1-(v-min)/range)*(h-pad*2);
      return x+","+y;
    }).join(" ");
    return (
      <div>

function RoastCalc(){
  const [client,setClient]=useState("");
  const [amount,setAmount]=useState("");
  const [unit,setUnit]=useState("g");
  const [slots,setSlots]=useState([]);
  const [pickerOpen,setPickerOpen]=useState(false);
  const [roastLevel,setRoastLevel]=useState("medium");
  const [customLoss,setCustomLoss]=useState(null);
  const [format,setFormat]=useState("drip");
  const [customFields,setCustomFields]=useState({name:"",type:"",capacity:"",roastTime:"",coolTime:""});
  const [roundStates,setRoundStates]=useState({});
  const [roundNotes,setRoundNotes]=useState({});
  const [log,setLog]=useState([]);
  const [schedule,setSchedule]=useState([]);
  const [activeTab,setActiveTab]=useState("calc");
  const [logSearch,setLogSearch]=useState("");
  const [logStatusFilter,setLogStatusFilter]=useState("all");
  const [storageReady,setStorageReady]=useState(false);
  const [beanCatalog,setBeanCatalog]=useState(DEFAULT_BEAN_CATALOG); // user can add/delete beans
  // Inventory
  const [inventory,setInventory]=useState([
    { id:"guji-g2",        origin:"Guji G2",                     supplier:"United Beans Inc.", processing:"Washed",    stockG:49380, costPerKg:16.20, lowAlertKg:5,  notes:"United Beans Inc. · Washed" },
    { id:"ethiopian-elto", origin:"Ethiopian Elto G1",            supplier:"Showroom Coffee",   processing:"Natural",   stockG:29880, costPerKg:19.93, lowAlertKg:5,  notes:"Showroom Coffee · Natural" },
    { id:"kenya-ndiara",   origin:"Kenya Ndiara FCS Week 15PB",   supplier:"Showroom Coffee",   processing:"Washed",    stockG:29880, costPerKg:26.37, lowAlertKg:5,  notes:"Showroom Coffee · Washed" },
    { id:"paraiso-92",     origin:"Paraiso 92 Red Bourbon P-02",  supplier:"Cafe Marcarena",    processing:"Anaerobic", stockG:18050, costPerKg:21.94, lowAlertKg:3,  notes:"Cafe Marcarena · Anaerobic" },
    { id:"lekempti-g4",   origin:"Lekempti G4",                  supplier:"Various",           processing:"Various",   stockG:0,     costPerKg:13.76, lowAlertKg:0,  notes:"KNDZ supply bean" },
  ]); // [{id,origin,stockG,costPerKg,lowAlertKg,notes,supplier,processing}]
  // Cost settings (persisted)
  const [costs,setCosts]=useState({greenCostPerKg:16.20,packagingCostPerUnit:0.234,packagingFlatOverride:null,hourlyRate:25}); // drip bag avg from Hebei/Wenzhou
  const [showCosts,setShowCosts]=useState(false);
  // Packaging inventory
  const [packagingInv,setPackagingInv]=useState([
    { id:"drip-bag",   name:"Drip Bags",   icon:"💧", stock:0, unit:"bags",  lowAlert:500 },
    { id:"steep-pack", name:"Steep Packs", icon:"🧃", stock:0, unit:"packs", lowAlert:500 },
    { id:"pouch-250g", name:"250g Pouches",icon:"🫘", stock:0, unit:"pouches",lowAlert:100 },
  ]);
  // Calculator mode & bean selection
  const [calcMode,setCalcMode]=useState("single");    // "single" | "multi"
  // Multi-track session state persisted across tab switches
  const [mtTracks,setMtTracks]=useState(null);           // null = not initialized
  const [mtSessionName,setMtSessionName]=useState("");
  const [mtGlobalTimer,setMtGlobalTimer]=useState(0);
  const [mtSessionRunning,setMtSessionRunning]=useState(false);
  const [mtSavedIds,setMtSavedIds]=useState([]);  // array of saved track IDs
  const [orderMode,setOrderMode]=useState("units");   // "units" | "weight"
  const [channel,setChannel]=useState("retail");       // "retail" | "wholesale" | "flavor"
  const [marginPct,setMarginPct]=useState(75);          // margin %
  const [unitCount,setUnitCount]=useState("");
  const [gramsPerUnit,setGramsPerUnit]=useState(15);   // default drip/steep = 15g, whole = 250g
  const [selectedBeanId,setSelectedBeanId]=useState(null);
  const [showBeanPicker,setShowBeanPicker]=useState(false);

  useEffect(()=>{
    const db = window.__db;
    const keys = [
      ["log", setLog],["schedule", setSchedule],["inventory", setInventory],
      ["costs", setCosts],["beanCatalog", setBeanCatalog],["packagingInv", setPackagingInv],
    ];
    Promise.all(keys.map(([key])=>db.collection("untamed-roastery").doc(key).get()))
      .then(snaps=>{
        snaps.forEach((snap,i)=>{ if(snap.exists&&snap.data()&&snap.data().value!=null) keys[i][1](snap.data().value); });
        setStorageReady(true);
      }).catch(()=>setStorageReady(true));
    const unsubs = keys.map(([key,setter])=>
      db.collection("untamed-roastery").doc(key).onSnapshot(snap=>{
        if(snap.exists&&snap.data()&&snap.data().value!=null) setter(snap.data().value);
      })
    );
    return ()=>unsubs.forEach(u=>u());
  },[]);
  function fbSet(key,value){ if(!storageReady||!window.__db)return; window.__db.collection("untamed-roastery").doc(key).set({value}).catch(()=>{}); }
  useEffect(()=>{ if(!storageReady)return; fbSet("log",log); },[log,storageReady]);
  useEffect(()=>{ if(!storageReady)return; fbSet("schedule",schedule); },[schedule,storageReady]);
  useEffect(()=>{ if(!storageReady)return; fbSet("inventory",inventory); },[inventory,storageReady]);
  useEffect(()=>{ if(!storageReady)return; fbSet("costs",costs); },[costs,storageReady]);
  useEffect(()=>{ if(!storageReady)return; fbSet("beanCatalog",beanCatalog); },[beanCatalog,storageReady]);
  useEffect(()=>{ if(!storageReady)return; fbSet("packagingInv",packagingInv); },[packagingInv,storageReady]);

  // Derived grams from either mode
  const gramsFromUnits = orderMode==="units" && unitCount ? parseFloat(unitCount)*gramsPerUnit : 0;
  const gramsFromWeight = orderMode==="weight" && amount ? (unit==="kg"?parseFloat(amount)*1000:parseFloat(amount)) : 0;
  const grams = orderMode==="units" ? gramsFromUnits : gramsFromWeight;
  // Selected bean
  const selectedBean = inventory.find(b=>b.id===selectedBeanId)||null;
  const level=ROAST_LEVELS.find(r=>r.id===roastLevel);
  const effectiveLoss=customLoss!=null?customLoss/100:(level?.loss||0.16);

  function resolveSlot(slot){
    const base=MACHINES.find(m=>m.id===slot.id)||MACHINES[0];
    if(slot.id==="custom"){
      const rt=parseFloat(customFields.roastTime)||12;
      return {...base,model:customFields.name||"My Machine",type:customFields.type||"Custom",capacity:parseFloat(customFields.capacity)||0,rt:{light:rt-2,"medium-light":rt-1,medium:rt,"medium-dark":rt+1,dark:rt+2},cool:parseFloat(customFields.coolTime)||6,qty:slot.qty};
    }
    return {...base,qty:slot.qty};
  }
  const resolved=slots.map(resolveSlot);
  const roastedCapPerRound=resolved.reduce((s,m)=>s+((m.capacity||0)*m.qty*(1-effectiveLoss)),0);
  const slowestRT=resolved.length>0?Math.max(...resolved.map(m=>m.rt?.[roastLevel]||12)):12;
  const slowestCool=resolved.length>0?Math.max(...resolved.map(m=>m.cool||6)):6;
  const timePerRound=slowestRT+slowestCool;
  const rounds=roastedCapPerRound>0?Math.ceil(grams/roastedCapPerRound):0;
  const totalRoastT=rounds*slowestRT;
  const totalCoolT=rounds*slowestCool;
  const totalTime=rounds*timePerRound;
  const totalRoasted=roastedCapPerRound*rounds;
  const wastage=Math.round(totalRoasted-grams);
  const greenNeeded=grams/(1-effectiveLoss);
  const canCompute=grams>0&&roastedCapPerRound>0;
  // Cost breakdown (live)
  const greenKg = greenNeeded/1000;
  const beanCostPerKg = selectedBean?.costPerKg || costs.greenCostPerKg || 0;
  const greenCost = greenKg * beanCostPerKg;
  const unitsPerKg = format==="whole"?4 : format==="drip"?Math.round(1000/gramsPerUnit):Math.round(1000/gramsPerUnit);
  const packagingUnits = orderMode==="units" ? (parseFloat(unitCount)||0) : Math.ceil((grams/1000)*unitsPerKg);
  const packagingPerUnit = packagingUnits * (costs.packagingCostPerUnit||0);
  const packagingCost = (costs.packagingFlatOverride!=null && costs.packagingFlatOverride!==""
    ? parseFloat(costs.packagingFlatOverride)
    : packagingPerUnit);
  const labourCost = (totalTime/60)*(costs.hourlyRate||0);
  const totalCost = greenCost + packagingCost + labourCost;
  const costPerG = grams>0 ? totalCost/grams : 0;
  const doneCount=Object.values(roundStates).filter(Boolean).length;
  const hasCustom=slots.some(s=>s.id==="custom");

  useEffect(()=>{setRoundStates({});setRoundNotes({});},[rounds]);

  const aiLines=canCompute?[
    `For the **${client||"order"}**: **${fmtW(grams)}** of **${level?.label}** roast (${FORMATS.find(f=>f.id===format)?.label}).`,
    `Running **${resolved.map(m=>`${m.qty}× ${m.model}`).join(" + ")}** in parallel — **${rounds} round${rounds!==1?"s":""}** totalling **${fmtT(totalTime)}** (${fmtT(totalRoastT)} roasting + ${fmtT(totalCoolT)} cooling).`,
    `Source **${fmtW(Math.ceil(greenNeeded))} green beans** — accounts for ~${Math.round(effectiveLoss*100)}% roast-loss at this level.`,
    wastage>100?`You'll have **${fmtW(wastage)}** of overage — ideal for QC cupping or samples.`:`Minimal wastage of **${fmtW(wastage)}** — tight and efficient.`,
    resolved.length>1?`⚡ Bottleneck: **${resolved.find(m=>(m.rt?.[roastLevel]||12)===slowestRT)?.model}** at ${slowestRT}min/batch.`:resolved[0]?.qty>1?`⚡ ${resolved[0].qty}× ${resolved[0].model} running in parallel.`:null,
  ].filter(Boolean):null;

  function addSlot(id){setSlots(p=>[...p,{id,qty:1}]);setPickerOpen(false);}
  function removeSlot(i){setSlots(p=>p.filter((_,j)=>j!==i));}
  function setQty(i,q){setSlots(p=>p.map((s,j)=>j===i?{...s,qty:Math.max(1,q)}:s));}
  function toggleRound(i){
    const wasOn = !!roundStates[i];
    setRoundStates(p=>({...p,[i]:!p[i]}));
    // Real-time inventory deduction per round
    if(selectedBeanId && rounds > 0){
      const greenPerRound = greenNeeded / rounds;
      const delta = wasOn ? +greenPerRound : -greenPerRound; // undo if unchecking
      setInventory(p=>p.map(b=>b.id===selectedBeanId
        ? {...b, stockG: Math.max(0, b.stockG + delta)}
        : b
      ));
    }
  }
  function setNote(i,n){setRoundNotes(p=>({...p,[i]:n}));}

  function saveLog(){
    if(!canCompute)return;
    const fmtLabel=FORMATS.find(f=>f.id===format)?.label||"";
    const entry={
      id:Date.now(),client,grams,
      roastLevel,
      machines:resolved.map(m=>`${m.qty}× ${m.model}`).join(", "),
      level:level?.label,lossPercent:Math.round(effectiveLoss*100),
      rounds,greenNeeded:Math.ceil(greenNeeded),totalTime,roastTime:totalRoastT,coolTime:totalCoolT,wastage,
      format:fmtLabel,status:"pending",orderNote:"",
      beanOrigin:selectedBean?.origin||null,
      beanOriginId:selectedBeanId||null,
      greenCostPerKg:beanCostPerKg||null,
      totalCost:totalCost>0?totalCost:null,
      costPerKg:costPerG>0?costPerG*1000:null,
      channel:channel||"retail",marginPct:marginPct||75,
      sellPricePerKg:(totalCost>0&&grams>0)?(totalCost/grams*1000)/(1-(marginPct||75)/100):null,
      margin:(totalCost>0&&grams>0)?((totalCost/grams*1000)/(1-(marginPct||75)/100))*(grams/1000)-totalCost:null,
      unitCount:orderMode==="units"?parseFloat(unitCount)||0:null,
      gramsPerUnit:orderMode==="units"?gramsPerUnit:null,
    };
    setLog(p=>[entry,...p]);
    // Note: green bean inventory is already deducted in real-time per round via toggleRound
    // Only deduct any remaining rounds that weren't manually checked off
    if(selectedBeanId && rounds > 0){
      const uncheckedRounds = rounds - doneCount;
      if(uncheckedRounds > 0){
        const greenPerRound = greenNeeded / rounds;
        const remaining = greenPerRound * uncheckedRounds;
        setInventory(p=>p.map(b=>b.id===selectedBeanId
          ? {...b, stockG: Math.max(0, b.stockG - remaining)}
          : b
        ));
      }
    }
    // Deduct packaging inventory
    if(packagingUnits>0){
      const pkgId = format==="drip"?"drip-bag":format==="steep"?"steep-pack":"pouch-250g";
      setPackagingInv(p=>p.map(pk=>pk.id===pkgId
        ? {...pk, stock:Math.max(0, pk.stock - packagingUnits)}
        : pk
      ));
    }
    setActiveTab("log");
  }

  function deleteEntry(id){setLog(p=>p.filter(e=>e.id!==id));}

  const filteredLog=log.filter(e=>{
    const matchSearch=!logSearch||e.client?.toLowerCase().includes(logSearch.toLowerCase())||e.machines?.toLowerCase().includes(logSearch.toLowerCase());
    const matchStatus=logStatusFilter==="all"||e.status===logStatusFilter;
    return matchSearch&&matchStatus;
  });

  function exportCSV(){
    function buildCSV(entries){
      const H=["Date","Time","Client","Channel","Format","Roast Level","Roasted Weight (g)","Roasted Weight (kg)","Machines","Rounds","Roast Time (min)","Cool Time (min)","Total Time (min)","Green Beans Needed (g)","Wastage (g)","Loss %","Sell Price ($/kg)","Total Revenue ($)","Total Cost ($)","Gross Profit ($)","Margin %","Bean Origin","Status","Notes"];
      const R=entries.map(function(e){
        const d=new Date(e.id);
        const kg=(e.grams/1000);
        const ch=typeof CHANNELS!=="undefined"?CHANNELS.find(function(c){ return c.id===(e.channel||"retail"); }):null;
        const sellPricePerKg=e.sellPricePerKg||0;
        const revenue=sellPricePerKg*kg;
        const cost=e.totalCost||0;
        const profit=revenue-cost;
        const marginPct=revenue>0?((profit/revenue)*100).toFixed(1):"";
        function q(v){ return '"'+String(v||"").replace(/"/g,'""')+'"'; }
        return [
          d.toLocaleDateString(),
          d.toLocaleTimeString(),
          q(e.client),
          q(ch?ch.label:(e.channel||"retail")),
          q(e.format),
          q(e.level),
          e.grams||0,
          kg.toFixed(3),
          q(e.machines),
          e.rounds||0,
          e.roastTime||"",
          e.coolTime||"",
          e.totalTime||0,
          e.greenNeeded||0,
          e.wastage||0,

          sellPricePerKg>0?sellPricePerKg.toFixed(2):"",
          revenue>0?revenue.toFixed(2):"",
          cost>0?cost.toFixed(2):"",
          revenue>0?profit.toFixed(2):"",
          marginPct,
          q(e.beanOrigin),
          q(e.status),
          q(e.orderNote),
        ];
      });
      return [H,...R].map(function(r){ return r.join(","); }).join("\n");
    }

    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="untamed-roast-log.csv";a.click();
    URL.revokeObjectURL(url);
  }

                  const rem=grams-roastedCapPerRound*i;
                  const thisRound=Math.min(rem,roastedCapPerRound);
                  return <RoundRow key={i} idx={i} thisRoasted={thisRound} maxRoasted={roastedCapPerRound} roastLevel={roastLevel} cumTime={(i+1)*timePerRound} done={!!roundStates[i]} onToggle={()=>toggleRound(i)} note={roundNotes[i]||""} onNote={n=>setNote(i,n)}/>;
                })}
              </div>
              {aiLines&&(
                <div style={{background:C.espresso,borderRadius:14,padding:20,marginBottom:20,border:`2px solid ${C.red}30`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:C.red,boxShadow:`0 0 10px ${C.red}`}}/>
                    <span style={{fontSize:10,letterSpacing:3,color:C.mocha,textTransform:"uppercase"}}>Roast Intelligence</span>
                  </div>
                  {aiLines.map((line,i)=><p key={i} className="ailn" style={{animationDelay:`${i*0.12}s`}} dangerouslySetInnerHTML={{__html:md(line)}}/>)}
                </div>
              )}
              <div style={{background:"rgba(255,255,255,0.7)",border:`1.5px solid ${C.tan}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <div style={{fontSize:10,letterSpacing:2,color:C.mocha,textTransform:"uppercase",marginBottom:10}}>On Save — inventory will be deducted:</div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {selectedBean&&<div style={{background:`${C.red}10`,border:`1px solid ${C.red}30`,borderRadius:8,padding:"6px 12px"}}>
                    <div style={{fontSize:10,color:C.mocha}}>🌱 Green beans</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.red,fontFamily:"Georgia,serif"}}>
                      {doneCount>0
                        ? <>−{fmtW(Math.round(greenNeeded/rounds*(rounds-doneCount)))} {selectedBean.origin} <span style={{fontSize:10,color:C.mocha,fontWeight:400}}>({doneCount}/{rounds} rounds already deducted live)</span></>
                        : <>−{fmtW(Math.ceil(greenNeeded))} {selectedBean.origin}</>
                      }
                    </div>
                  </div>}
                  {packagingUnits>0&&<div style={{background:`${C.red}10`,border:`1px solid ${C.red}30`,borderRadius:8,padding:"6px 12px"}}>
                    <div style={{fontSize:10,color:C.mocha}}>📦 Packaging</div>
                    <div style={{fontSize:13,fontWeight:700,color:C.red,fontFamily:"Georgia,serif"}}>−{packagingUnits.toLocaleString()} {FORMATS.find(f=>f.id===format)?.label}</div>
                  </div>}
                  {!selectedBean&&<div style={{fontSize:12,color:C.mocha,fontStyle:"italic",padding:"6px 0"}}>Select a bean above to track green bean deduction</div>}
                </div>
              </div>
              <button className="savebtn" onClick={saveLog}>Save to Order Log →</button>
            </>
          )}
          {!canCompute&&(
            <div style={{textAlign:"center",padding:"64px 0",color:C.mocha}}>
              <div style={{fontSize:52,marginBottom:12}}>☕</div>
              <div style={{fontSize:14,fontStyle:"italic"}}>Enter an order amount to begin calculating</div>
            </div>
          )}
          </>)}
        </div>
      )}

      
      {activeTab==="log"&&(
        <div style={{maxWidth:980,margin:"0 auto",padding:"20px 16px"}}>
          {log.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:20}}>
              {[
                {label:"Total Orders",value:totalOrders,icon:"📦",color:C.red},
                {label:"Total Roasted",value:`${totalKgRoasted.toFixed(1)}kg`,icon:"☕",color:C.espresso},
                {label:"Active Orders",value:pendingCount,icon:"🔥",color:"#d97706"},
                {label:"Est. Revenue",value:totalRevenue>0?`$${totalRevenue.toFixed(0)}`:"—",icon:"💰",color:"#16a34a"},
              ].map(s=>(
                <div key={s.label} className="statcard">
                  <div style={{fontSize:22,marginBottom:6}}>{s.icon}</div>
                  <div style={{fontSize:10,letterSpacing:2,color:C.mocha,textTransform:"uppercase",marginBottom:6}}>{s.label}</div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:26,color:s.color,fontWeight:900,lineHeight:1}}>{s.value}</div>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
            <input className="inp" value={logSearch} onChange={e=>setLogSearch(e.target.value)} placeholder="🔍  Search client or machine…" style={{flex:1,minWidth:200,padding:"9px 14px"}}/>
            <select value={logStatusFilter} onChange={e=>setLogStatusFilter(e.target.value)} style={{border:`1.5px solid ${C.tan}`,borderRadius:10,padding:"9px 14px",fontFamily:"Georgia,serif",fontSize:13,color:C.espresso,background:C.white,cursor:"pointer"}}>
              <option value="all">All statuses</option>
              {STATUS_OPTIONS.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
            {log.length>0&&<button onClick={exportCSV} style={{background:C.espresso,border:"none",color:C.cream,borderRadius:10,padding:"9px 18px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,whiteSpace:"nowrap"}}>↓ Export CSV</button>}
          </div>
          {filteredLog.length>0&&(
            <div style={{display:"none"}}>
              <div style={{flex:"0 0 130px"}}>Client</div>
            </div>
          )}
          {filteredLog.length>0
            ? filteredLog.map(entry=><LogEntryCard key={entry.id} entry={entry} onDelete={()=>deleteEntry(entry.id)} onStatusChange={s=>updateEntry({...entry,status:s})} onNoteChange={updated=>updateEntry(updated)}/>)
            : <div style={{textAlign:"center",padding:"80px 0",color:C.mocha}}>
                <div style={{fontSize:48,marginBottom:12}}>📋</div>
                <div style={{fontSize:16,fontWeight:700,color:C.espresso,marginBottom:8,fontFamily:"Georgia,serif"}}>{log.length===0?"No orders logged yet":"No orders match your filter"}</div>
                <div style={{fontSize:13,fontStyle:"italic"}}>{log.length===0?"Calculate a roast and hit \"Save to Order Log\" to start tracking":"Try adjusting your search or filter"}</div>
                {log.length===0&&<button onClick={()=>setActiveTab("calc")} style={{marginTop:20,background:C.red,border:"none",color:C.cream,borderRadius:10,padding:"10px 24px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:14,fontWeight:700}}>Go to Calculator →</button>}
              </div>
          }
        </div>
      )}

      
      {activeTab==="calendar"&&(
        <CalendarTab log={log} schedule={schedule} onScheduleChange={setSchedule}/>
      )}

      
      {activeTab==="inventory"&&(
        <InventoryTab inventory={inventory} setInventory={setInventory} log={log} beanCatalog={beanCatalog} setBeanCatalog={setBeanCatalog} packagingInv={packagingInv} setPackagingInv={setPackagingInv}/>
      )}

      {activeTab==="finance"&&(
        <FinanceTab log={log} inventory={inventory}/>
      )}    </div>
  );
}

  </script>
  <script>
    var appScript = document.getElementById('app-source').textContent;
    var transformed = Babel.transform(appScript, {presets:['react'],sourceType:'script'}).code;
    var useState = React.useState;
    var useEffect = React.useEffect;
    eval(transformed);
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(RoastCalc, null));
    setTimeout(function(){
      document.getElementById('sdot').classList.remove('pulse');
      document.getElementById('slabel').textContent = 'Live sync ✓';
    }, 2500);
  </script>
</body>
</html>
