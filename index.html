                  </div>
                </div>
              </div>
              <div>
                <div style={{fontSize:10,letterSpacing:2,color:C.mocha,textTransform:"uppercase",marginBottom:5}}>Cost per kg ($)</div>
                <input type="number" min="0" step="0.01" value={form.costPerKg} onChange={e=>setForm(f=>({...f,costPerKg:e.target.value}))} placeholder="e.g. 16.20"
                  style={{border:`1.5px solid ${C.tan}`,borderRadius:10,padding:"10px 14px",width:"100%",fontFamily:"Georgia,serif",fontSize:14,color:C.dark,background:C.white,outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div>
                <div style={{fontSize:10,letterSpacing:2,color:C.mocha,textTransform:"uppercase",marginBottom:5}}>Low stock alert (kg)</div>
                <input type="number" min="0" step="0.1" value={form.lowAlertKg} onChange={e=>setForm(f=>({...f,lowAlertKg:e.target.value}))} placeholder="e.g. 5"
                  style={{border:`1.5px solid ${C.tan}`,borderRadius:10,padding:"10px 14px",width:"100%",fontFamily:"Georgia,serif",fontSize:14,color:C.dark,background:C.white,outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div>
                <div style={{fontSize:10,letterSpacing:2,color:C.mocha,textTransform:"uppercase",marginBottom:5}}>Notes (optional)</div>
                <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Process notes, harvest year…"
                  style={{border:`1.5px solid ${C.tan}`,borderRadius:10,padding:"10px 14px",width:"100%",fontFamily:"Georgia,serif",fontSize:14,color:C.dark,background:C.white,outline:"none",boxSizing:"border-box"}}/>
              </div>
            </div>
            <button onClick={saveItem} style={{width:"100%",padding:"13px",background:(!form.origin||!form.stockG)?C.tan:C.red,color:C.cream,border:"none",borderRadius:12,fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,cursor:(!form.origin||!form.stockG)?"not-allowed":"pointer"}}>
              {editId?"Save Changes →":"Add to Inventory →"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


const SL = ({children,style={}}) => <div style={{fontSize:10,letterSpacing:3,color:C.mocha,textTransform:"uppercase",marginBottom:10,fontFamily:"Georgia,serif",...style}}>{children}</div>;

// ─── MULTI-TRACK SESSION ───────────────────────────────────────────
function MultiTrackSession({ inventory, onSaveSession, persistedTracks, onTracksChange, sessionName, onSessionNameChange, globalTimer, onTimerChange, sessionRunning, onSessionRunningChange, savedTrackIds, onSavedTrackIdsChange }){
  var useState = React.useState;
  var useEffect = React.useEffect;
  var C2 = {cream:"#F0E4CC",red:"#D95035",dark:"#0C0C0C",tan:"#D1BA9B",mocha:"#997C6F",espresso:"#47322F",white:"#FFFFFF"};
  var TRACK_COLORS = ["#D95035","#2563eb","#16a34a","#7c3aed","#d97706","#0891b2"];

  function newTrack(){ return {id:Date.now()+Math.random(),machineId:"",beanId:"",roastLevel:"medium",gramsInput:"",gramsUnit:"g",grams:0,roundStates:{},roundNotes:{},notes:"",channel:"retail",marginPct:75,startTime:"",trackTimer:0,trackRunning:false}; }

  // Use persisted state from parent (survives tab switches)
  var tracks = persistedTracks || [newTrack(),newTrack()];
  function setTracks(fn){ var next = typeof fn==="function" ? fn(tracks) : fn; onTracksChange(next); }

  // Per-track timer tick
  useEffect(function(){
    var interval = setInterval(function(){
      var anyRunning = tracks.some(function(t){ return t.trackRunning; });
      if(!anyRunning) return;
      setTracks(function(p){ return p.map(function(t){
        return t.trackRunning ? Object.assign({},t,{trackTimer:(t.trackTimer||0)+1}) : t;
      }); });
    }, 1000);
    return function(){ clearInterval(interval); };
  }, [tracks]);

  // Timer effect
  useEffect(function(){
    if(!sessionRunning) return;
    var t = setInterval(function(){ onTimerChange(function(s){ return s+1; }); }, 1000);
    return function(){ clearInterval(t); };
  }, [sessionRunning]);

  // Initialize tracks if null
  useEffect(function(){
    if(persistedTracks===null){ onTracksChange([newTrack(),newTrack()]); }
  }, []);

  function fmtSec(s){ var m=Math.floor(s/60),sec=s%60; return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0"); }
  function updateTrack(id,updates){ setTracks(function(p){ return p.map(function(t){ return t.id===id?Object.assign({},t,updates):t; }); }); }
  function updateTrackRoundNote(trackId,roundIdx,note){
    setTracks(function(p){ return p.map(function(t){
      if(t.id!==trackId) return t;
      var rn=Object.assign({},t.roundNotes||{});
      if(note) rn[roundIdx]=note; else delete rn[roundIdx];
      return Object.assign({},t,{roundNotes:rn});
    }); });
  }
  function removeTrack(id){ setTracks(function(p){ return p.filter(function(t){ return t.id!==id; }); }); }
  function addTrack(){ setTracks(function(p){ return [...p,newTrack()]; }); }
  function toggleRound(trackId,roundIdx,wasDone){
    setTracks(function(p){ return p.map(function(t){
      if(t.id!==trackId) return t;
      var rs=Object.assign({},t.roundStates||{});
      if(wasDone){ delete rs[roundIdx]; } else { rs[roundIdx]=Date.now(); }
      return Object.assign({},t,{roundStates:rs});
    }); });
  }

  var totalGreen = tracks.reduce(function(s,t){
    var lv=ROAST_LEVELS.find(function(r){ return r.id===t.roastLevel; })||ROAST_LEVELS[2];
    return s+(t.grams>0?t.grams/(1-lv.loss):0);
  },0);

  function buildEntry(t){
    var m=MACHINES.find(function(x){ return x.id===t.machineId; });
    var lv=ROAST_LEVELS.find(function(r){ return r.id===t.roastLevel; })||ROAST_LEVELS[2];
    var loss=lv.loss;
    var cap=m?m.capacity*(1-loss):0;
    var rounds=cap>0?Math.ceil(t.grams/cap):0;
    var rt=m?(m.rt?.[t.roastLevel]||12):12;
    var cool=m?(m.cool||6):6;
    var bean=inventory.find(function(b){ return b.id===t.beanId; })||null;
    var doneCount=Object.values(t.roundStates||{}).filter(Boolean).length;
    var actualRounds=doneCount>0?doneCount:rounds;
    var sellPricePerKg=(cap>0&&t.grams>0&&t.marginPct>0)?((((bean?bean.costPerKg||0:0)*Math.ceil(t.grams/(1-loss))/1000)/t.grams*1000)/(1-t.marginPct/100)):null;
    // Build per-round detail array for log display
    var roundDetails=Array.from({length:rounds}).map(function(_,i){
      return {round:i+1,done:!!(t.roundStates||{})[i],note:(t.roundNotes||{})[i]||""};
    });
    return {
      id:Date.now()+Math.random(),
      client:t.startTime?t.startTime:(sessionName||"Multi-track Session"),
      grams:t.grams,roastLevel:t.roastLevel,level:lv.label,
      machines:m?"1× "+m.model:"Unknown",
      rounds,completedRounds:doneCount,
      totalTime:actualRounds*(rt+cool),roastTime:actualRounds*rt,coolTime:actualRounds*cool,
      greenNeeded:Math.ceil(t.grams/(1-loss)),
      wastage:Math.round(cap*rounds-t.grams),
      lossPercent:Math.round(loss*100),
      format:"whole",status:"pending",orderNote:t.notes||"",
      channel:t.channel||"retail",marginPct:t.marginPct||75,
      sellPricePerKg:sellPricePerKg,
      margin:sellPricePerKg?(sellPricePerKg*(t.grams/1000)-((bean?bean.costPerKg||0:0)*Math.ceil(t.grams/(1-loss))/1000)):null,
      beanOrigin:bean?bean.origin:null,beanOriginId:t.beanId||null,
      trackStartTime:t.startTime||null,
      trackElapsed:t.trackTimer||0,
      greenCostPerKg:bean?bean.costPerKg||0:null,
      totalCost:bean?((bean.costPerKg||0)*Math.ceil(t.grams/(1-loss))/1000):null,
      sessionDuration:globalTimer,isMultiTrack:true,
      roundDetails:roundDetails,
    };
  }

  function saveTrack(track){
    onSaveSession([buildEntry(track)]);
    onSavedTrackIdsChange(function(p){ return p.includes(track.id)?p:[...p,track.id]; });
  }

  function saveAllUnsaved(){
    var unsaved=tracks.filter(function(t){ return t.grams>0&&t.machineId&&!(Array.isArray(savedTrackIds)&&savedTrackIds.includes(t.id)); });
    onSaveSession(unsaved.map(buildEntry));
    onSavedTrackIdsChange(function(p){ var newIds=unsaved.map(function(t){ return t.id; }); return [...p,...newIds.filter(function(id){ return !p.includes(id); })]; });
  }

  var readyTracks = tracks.filter(function(t){ return t.grams>0&&t.machineId; });
  var unsavedCount = readyTracks.filter(function(t){ return !(Array.isArray(savedTrackIds)&&savedTrackIds.includes(t.id)); }).length;

  return (
    <div style={{paddingBottom:24}}>
      <div style={{background:C2.espresso,borderRadius:14,padding:14,marginBottom:14}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:180}}>
            <span style={{fontSize:16}}>⚡</span>
            <input value={sessionName} onChange={function(e){ onSessionNameChange(e.target.value); }} placeholder="Session name e.g. Feb 25 AM"
              style={{flex:1,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(240,228,204,0.25)",borderRadius:8,padding:"7px 11px",color:C2.cream,fontFamily:"Georgia,serif",fontSize:12,outline:"none"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontFamily:"monospace",fontSize:20,color:sessionRunning?C2.red:C2.mocha,fontWeight:700,minWidth:56,textAlign:"center"}}>{fmtSec(globalTimer)}</div>
            <button onClick={function(){ onSessionRunningChange(function(v){ return !v; }); }}
              style={{background:sessionRunning?"#fee2e2":C2.red,color:sessionRunning?"#dc2626":C2.cream,border:"none",borderRadius:9,padding:"8px 14px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
              {sessionRunning?"⏸ Pause":"▶ Start"}
            </button>
          </div>
        </div>
      </div>

      {tracks.map(function(track,idx){
        var m=MACHINES.find(function(x){ return x.id===track.machineId; });
        var lv=ROAST_LEVELS.find(function(r){ return r.id===(track.roastLevel||"medium"); })||ROAST_LEVELS[2];
        var loss=lv.loss;
        var grams=track.grams||0;
        var cap=m?m.capacity*(1-loss):0;
        var rounds=cap>0?Math.ceil(grams/cap):0;
        var rt=m?(m.rt?.[track.roastLevel||"medium"]||12):12;
        var cool=m?(m.cool||6):6;
        var totalTime=rounds*(rt+cool);
        var greenNeeded=grams>0?grams/(1-loss):0;
        var bean=inventory.find(function(b){ return b.id===track.beanId; })||null;
        var doneCount=Object.keys(track.roundStates||{}).length;
        var color=TRACK_COLORS[idx%TRACK_COLORS.length];
        var isSaved=Array.isArray(savedTrackIds)&&savedTrackIds.includes(track.id);
        // Feature 2: remaining time
        var timePerRound=rt+cool;
        var remainingRounds=rounds-doneCount;
        var remainingTime=remainingRounds*timePerRound;

        return (
          <div key={track.id} style={{border:"2px solid "+color+"35",borderRadius:14,background:"rgba(255,255,255,0.92)",overflow:"hidden",marginBottom:12}}>
            <div style={{background:color+"10",borderBottom:"1px solid "+color+"20",padding:"9px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                <div style={{width:9,height:9,borderRadius:"50%",background:color,flexShrink:0}}/>
                <span style={{fontSize:12,fontWeight:700,color:C2.espresso,fontFamily:"Georgia,serif"}}>Track {idx+1}</span>
                {m&&<span style={{fontSize:10,color:C2.mocha,background:C2.cream,border:"1px solid "+C2.tan,borderRadius:20,padding:"1px 7px"}}>{m.model}</span>}
                {bean&&<span style={{fontSize:10,color:color,background:color+"15",border:"1px solid "+color+"40",borderRadius:20,padding:"1px 7px"}}>{bean.origin.split(" ").slice(0,2).join(" ")}</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                {rounds>0&&<span style={{fontSize:11,color:C2.mocha,whiteSpace:"nowrap"}}><b style={{color:doneCount===rounds&&rounds>0?"#16a34a":color}}>{doneCount}</b>/{rounds} done</span>}
                {tracks.length>1&&<button onClick={function(){ removeTrack(track.id); }} style={{background:"#fee2e2",border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11,color:"#dc2626",fontFamily:"Georgia,serif"}}>✕</button>}
              </div>
            </div>

            <div style={{padding:12}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",justifyContent:"space-between",background:"#1a1008",borderRadius:10,padding:"8px 12px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:7,flex:1,minWidth:140}}>
                  <span style={{fontSize:14,color:color}}>⚡</span>
                  <input type="text" value={track.startTime||""} onChange={function(e){ updateTrack(track.id,{startTime:e.target.value}); }}
                    placeholder={"Track "+(idx+1)+" start time e.g. 9:00 AM"}
                    style={{flex:1,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(240,228,204,0.2)",borderRadius:7,padding:"5px 10px",color:"#F0E4CC",fontFamily:"Georgia,serif",fontSize:11,outline:"none"}}
                  />
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontFamily:"monospace",fontSize:18,color:track.trackRunning?color:"#997C6F",fontWeight:700,minWidth:52,textAlign:"center"}}>{fmtSec(track.trackTimer||0)}</div>
                  <button onClick={function(){ updateTrack(track.id,{trackRunning:!track.trackRunning}); }}
                    style={{background:track.trackRunning?"#fee2e2":color,color:track.trackRunning?"#dc2626":"#fff",border:"none",borderRadius:8,padding:"6px 13px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                    {track.trackRunning?"⏸ Pause":"▶ Start"}
                  </button>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:10}}>
                <div>
                  <div style={{fontSize:10,letterSpacing:1.5,color:C2.mocha,textTransform:"uppercase",marginBottom:5}}>Machine</div>
                  <select value={track.machineId||""} onChange={function(e){ updateTrack(track.id,{machineId:e.target.value}); }}
                    style={{width:"100%",border:"1.5px solid "+(track.machineId?color:C2.tan),borderRadius:9,padding:"8px 9px",fontFamily:"Georgia,serif",fontSize:12,color:C2.dark,background:C2.white,outline:"none",boxSizing:"border-box"}}>
                    <option value="">Select machine…</option>
                    {BRANDS.map(function(brand){ return (
                      <optgroup key={brand} label={brand}>
                        {MACHINES.filter(function(mx){ return mx.brand===brand; }).map(function(mx){ return <option key={mx.id} value={mx.id}>{mx.model} ({mx.tag})</option>; })}
                      </optgroup>
                    ); })}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:10,letterSpacing:1.5,color:C2.mocha,textTransform:"uppercase",marginBottom:5}}>Roast Level</div>
                  <select value={track.roastLevel||"medium"} onChange={function(e){ updateTrack(track.id,{roastLevel:e.target.value}); }}
                    style={{width:"100%",border:"1.5px solid "+C2.tan,borderRadius:9,padding:"8px 9px",fontFamily:"Georgia,serif",fontSize:12,color:C2.dark,background:C2.white,outline:"none",boxSizing:"border-box"}}>
                    {ROAST_LEVELS.map(function(l){ return <option key={l.id} value={l.id}>{l.label}</option>; })}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:10,letterSpacing:1.5,color:C2.mocha,textTransform:"uppercase",marginBottom:5}}>Target Roasted</div>
                  <div style={{display:"flex",gap:4}}>
                    <input type="number" placeholder="e.g. 2000" value={track.gramsInput||""} onChange={function(e){
                      var raw=e.target.value;
                      var g=(track.gramsUnit||"g")==="kg"?parseFloat(raw)*1000:parseFloat(raw);
                      updateTrack(track.id,{gramsInput:raw,grams:isNaN(g)?0:g});
                    }} style={{flex:1,border:"1.5px solid "+C2.tan,borderRadius:9,padding:"8px 9px",fontFamily:"Georgia,serif",fontSize:13,color:C2.dark,background:C2.white,outline:"none",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",background:C2.white,borderRadius:8,overflow:"hidden",border:"1px solid "+C2.tan,flexShrink:0}}>
                      {["g","kg"].map(function(u){ return (
                        <button key={u} onClick={function(){
                          var g=u==="kg"?parseFloat(track.gramsInput||0)*1000:parseFloat(track.gramsInput||0);
                          updateTrack(track.id,{gramsUnit:u,grams:isNaN(g)?0:g});
                        }} style={{padding:"0 8px",background:(track.gramsUnit||"g")===u?color:"transparent",color:(track.gramsUnit||"g")===u?"#fff":C2.mocha,border:"none",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11}}>{u}</button>
                      ); })}
                    </div>
                  </div>
                </div>
                <div>
                  <div style={{fontSize:10,letterSpacing:1.5,color:C2.mocha,textTransform:"uppercase",marginBottom:5}}>Bean Origin</div>
                  <select value={track.beanId||""} onChange={function(e){ updateTrack(track.id,{beanId:e.target.value}); }}
                    style={{width:"100%",border:"1.5px solid "+(track.beanId?color:C2.tan),borderRadius:9,padding:"8px 9px",fontFamily:"Georgia,serif",fontSize:12,color:C2.dark,background:C2.white,outline:"none",boxSizing:"border-box"}}>
                    <option value="">Select bean…</option>
                    {inventory.map(function(b){ return <option key={b.id} value={b.id}>{b.origin} ({(b.stockG/1000).toFixed(1)}kg)</option>; })}
                  </select>
                </div>
              </div>

              {grams>0&&m&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
                  {[
                    {l:"Rounds",v:rounds+""},
                    {l:"Total Time",v:fmtT(totalTime)},
                    {l:"Green",v:fmtW(Math.ceil(greenNeeded))},
                  ].map(function(s){ return (
                    <div key={s.l} style={{background:C2.white,border:"1px solid "+C2.tan,borderRadius:8,padding:"5px 6px",textAlign:"center"}}>
                      <div style={{fontSize:9,color:C2.mocha,textTransform:"uppercase",letterSpacing:1}}>{s.l}</div>
                      <div style={{fontSize:13,fontWeight:700,color:color,fontFamily:"Georgia,serif"}}>{s.v}</div>
                    </div>
                  ); })}
                </div>
              )}

              {rounds>0&&(
                <div style={{background:C2.cream,borderRadius:10,padding:10,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:10,color:C2.mocha,textTransform:"uppercase",letterSpacing:1.5}}>Round Tracker</span>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{fontSize:11,color:C2.mocha}}><b style={{color:doneCount===rounds&&rounds>0?"#16a34a":color}}>{doneCount}</b>/{rounds}</span>
                      {remainingTime>0&&(
                        <span style={{fontSize:11,fontWeight:700,color:color,background:color+"15",border:"1px solid "+color+"30",borderRadius:20,padding:"2px 9px",whiteSpace:"nowrap"}}>
                          ⏱ {fmtT(remainingTime)} left
                        </span>
                      )}
                      {doneCount===rounds&&rounds>0&&<span style={{fontSize:13}}>🎉</span>}
                    </div>
                  </div>
                  {Array.from({length:rounds}).map(function(_,i){
                    var done=!!(track.roundStates||{})[i];
                    return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <button onClick={function(){ toggleRound(track.id,i,done); }}
                          style={{width:22,height:22,borderRadius:6,border:"2px solid "+(done?"#16a34a":color),background:done?"#16a34a":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {done&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
                        </button>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                            <span style={{fontSize:11,color:done?"#16a34a":C2.espresso,textDecoration:done?"line-through":"none"}}>Round {i+1}</span>
                            <span style={{fontSize:10,color:C2.mocha}}>{done?"done":fmtT((i+1-doneCount)*timePerRound)+" rem."}</span>
                          </div>
                          <div style={{height:4,background:"rgba(0,0,0,0.06)",borderRadius:2,overflow:"hidden",marginBottom:4}}>
                            <div style={{height:"100%",width:done?"100%":"0%",background:color,borderRadius:2,transition:"width 0.3s"}}/>
                          </div>
                          <input
                            type="text"
                            value={(track.roundNotes||{})[i]||""}
                            onChange={function(e){ updateTrackRoundNote(track.id,i,e.target.value); }}
                            placeholder={"Round "+(i+1)+" note..."}
                            style={{width:"100%",fontSize:10,border:"1px solid "+(done?"#86efac":C2.tan),borderRadius:5,padding:"3px 7px",fontFamily:"Georgia,serif",color:C2.espresso,background:done?"#f0fdf4":"rgba(255,255,255,0.8)",outline:"none",boxSizing:"border-box"}}
                          />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,letterSpacing:1.5,color:C2.mocha,textTransform:"uppercase",marginBottom:6}}>Sales Channel & Margin</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
                  {CHANNELS.map(function(ch){
                    var sel=(track.channel||"retail")===ch.id;
                    return (
                      <button key={ch.id} onClick={function(){ updateTrack(track.id,{channel:ch.id,marginPct:channelMargin(ch.id)}); }}
                        style={{flex:"1 1 auto",padding:"6px 8px",borderRadius:8,border:"2px solid "+(sel?color:C2.tan),background:sel?color+"18":"rgba(255,255,255,0.7)",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11,fontWeight:sel?700:400,color:sel?color:C2.mocha}}>
                        {ch.icon} {ch.label} <span style={{fontSize:9,opacity:0.8}}>~{ch.defaultMargin}%</span>
                      </button>
                    );
                  })}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                  <span style={{fontSize:11,color:C2.mocha}}>Margin %</span>
                  <input type="number" value={track.marginPct||75} onChange={function(e){ updateTrack(track.id,{marginPct:parseFloat(e.target.value)||0}); }}
                    style={{width:64,border:"1.5px solid "+color,borderRadius:7,padding:"4px 8px",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,color:color,background:"rgba(255,255,255,0.9)",textAlign:"center",outline:"none"}}/>
                  <span style={{fontSize:11,color:C2.mocha}}>%</span>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,letterSpacing:1.5,color:C2.mocha,textTransform:"uppercase",marginBottom:5}}>Notes</div>
                <textarea value={track.notes||""} onChange={function(e){ updateTrack(track.id,{notes:e.target.value}); }}
                  placeholder="Client name, delivery date, special instructions…"
                  style={{width:"100%",border:"1.5px solid "+C2.tan,borderRadius:9,padding:"8px 10px",fontFamily:"Georgia,serif",fontSize:12,color:C2.dark,background:C2.white,outline:"none",resize:"vertical",minHeight:48,boxSizing:"border-box"}}/>
              </div>

              <div>
                {isSaved
                  ? <div style={{padding:"9px 14px",background:"#dcfce7",border:"1px solid #86efac",borderRadius:9,color:"#16a34a",fontSize:12,fontFamily:"Georgia,serif",fontWeight:700,textAlign:"center"}}>✓ Saved to Order Log</div>
                  : <button onClick={function(){ saveTrack(track); }} disabled={!(grams>0&&m)} style={{width:"100%",padding:"9px 14px",background:(grams>0&&m)?color:"#ccc",color:"#fff",border:"none",borderRadius:9,cursor:(grams>0&&m)?"pointer":"default",fontFamily:"Georgia,serif",fontSize:12,fontWeight:700}}>Save Track {idx+1} to Order Log</button>
                }
              </div>
            </div>
          </div>
        );
      })}

      <button onClick={addTrack} style={{width:"100%",padding:11,border:"2px dashed "+C2.tan,borderRadius:12,background:"transparent",cursor:"pointer",color:C2.mocha,fontFamily:"Georgia,serif",fontSize:13,marginBottom:12}}>
        + Add Another Track
      </button>

      {readyTracks.length>0&&(
        <div style={{background:C2.espresso,borderRadius:12,padding:"11px 14px",marginBottom:12,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {[{l:"Tracks",v:readyTracks.length},{l:"Total Green",v:fmtW(Math.ceil(totalGreen))},{l:"Session",v:fmtSec(globalTimer)}].map(function(s){ return (
              <div key={s.l} style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:C2.mocha,letterSpacing:2,textTransform:"uppercase"}}>{s.l}</div>
                <div style={{fontSize:16,fontWeight:700,color:C2.cream,fontFamily:s.l==="Session"?"monospace":"Georgia,serif"}}>{s.v}</div>
              </div>
            ); })}
          </div>
          <div style={{fontSize:11,color:C2.mocha,fontStyle:"italic"}}>{savedTrackIds.length}/{readyTracks.length} saved</div>
        </div>
      )}

      {unsavedCount>0&&(
        <button onClick={saveAllUnsaved} style={{width:"100%",padding:14,background:"#D95035",color:"#F0E4CC",border:"none",borderRadius:12,fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,cursor:"pointer",letterSpacing:1}}>
          Save All Unsaved ({unsavedCount}) →
        </button>
      )}
    </div>
  );
}



// ════════════════ FINANCE TAB ════════════════
function FinanceTab({ log, inventory }){
  var useState = React.useState;
  var C = {cream:"#F0E4CC",red:"#D95035",dark:"#0C0C0C",tan:"#D1BA9B",mocha:"#997C6F",espresso:"#47322F",white:"#FFFFFF",peach:"#E3A88E",green:"#16a34a",blue:"#2563eb"};

  // Filters
  var df = useState(""); var dateFrom=df[0]; var setDateFrom=df[1];
  var dt = useState(""); var dateTo=dt[0]; var setDateTo=dt[1];
  var cf = useState("all"); var channelFilter=cf[0]; var setChannelFilter=cf[1];
  var pf = useState("all"); var productFilter=pf[0]; var setProductFilter=pf[1];
  var sf = useState("date-desc"); var sortBy=sf[0]; var setSortBy=sf[1];

  // Filter log to completed/in-progress entries with cost data
  var allEntries = log.filter(function(e){ return e.grams>0; });

  var filtered = allEntries.filter(function(e){
    if(channelFilter!=="all" && (e.channel||"retail")!==channelFilter) return false;
    if(productFilter!=="all"){
      var fmt=(e.format||"").toLowerCase();
      var ch=(e.channel||"retail");
      var key=ch+"-"+fmt;
      if(productFilter!==key && productFilter!==fmt) return false;
    }
    if(dateFrom){ var d=new Date(e.id); var f=new Date(dateFrom); if(d<f) return false; }
    if(dateTo){ var d2=new Date(e.id); var t2=new Date(dateTo); t2.setHours(23,59,59); if(d2>t2) return false; }
    return true;
  });

  // Sort
  filtered = filtered.slice().sort(function(a,b){
    if(sortBy==="date-desc") return b.id-a.id;
    if(sortBy==="date-asc") return a.id-b.id;
    if(sortBy==="revenue-desc") return ((b.sellPricePerKg||0)*(b.grams/1000)) - ((a.sellPricePerKg||0)*(a.grams/1000));
    if(sortBy==="margin-desc") return (b.margin||0)-(a.margin||0);
    if(sortBy==="weight-desc") return b.grams-a.grams;
    return 0;
  });

  // Compute per-entry financials
  function entryFinance(e){
    var kg = e.grams/1000;
    var mPct = e.marginPct!=null ? e.marginPct : (e.channel==="wholesale"?40:e.channel==="flavor"?33:75);
    var greenCost = (e.greenCostPerKg||0)*(e.greenNeeded/1000);
    var totalCost = e.totalCost!=null ? e.totalCost : greenCost;
    var sellPricePerKg = e.sellPricePerKg;
    // If no sell price set, auto-calculate from cost + margin
    if(!sellPricePerKg && totalCost>0 && kg>0){
      var costPerKg = totalCost/kg;
      sellPricePerKg = costPerKg / (1 - mPct/100);
    }
    var revenue = (sellPricePerKg||0)*kg;
    var margin = revenue - totalCost;
    var marginPct = revenue>0 ? (margin/revenue)*100 : 0;
    var wasteCost = (e.greenCostPerKg||0)*((e.wastage||0)/1000);
    return { greenCost, totalCost, revenue, margin, marginPct, wasteCost, sellPricePerKg: sellPricePerKg||0 };
  }

  // Aggregates
  var totals = filtered.reduce(function(acc,e){
    var f=entryFinance(e);
    acc.revenue += f.revenue;
    acc.cost += f.totalCost;
    acc.margin += f.margin;
    acc.greenCost += f.greenCost;
    acc.wasteCost += f.wasteCost;
    acc.kg += e.grams/1000;
    acc.entries++;
    return acc;
  },{revenue:0,cost:0,margin:0,greenCost:0,wasteCost:0,kg:0,entries:0});

  var overallMarginPct = totals.revenue>0 ? (totals.margin/totals.revenue)*100 : 0;

  // Channel breakdown
  var channelBreakdown = CHANNELS.map(function(ch){
    var ces = filtered.filter(function(e){ return (e.channel||"retail")===ch.id; });
    var rev = ces.reduce(function(s,e){ return s+entryFinance(e).revenue; },0);
    var cost = ces.reduce(function(s,e){ return s+entryFinance(e).totalCost; },0);
    var margin = rev-cost;
    var kg = ces.reduce(function(s,e){ return s+e.grams/1000; },0);
    return { id:ch.id, label:ch.label, icon:ch.icon, count:ces.length, rev, cost, margin, kg,
      marginPct: rev>0?(margin/rev)*100:0 };
  }).filter(function(c){ return c.count>0; });

  // Product breakdown (channel + format combos)
  var productBreakdown = [];
  CHANNELS.forEach(function(ch){
    FORMATS.forEach(function(fmt){
      var pes = filtered.filter(function(e){ return (e.channel||"retail")===ch.id && (e.format||"").toLowerCase().includes(fmt.id); });
      if(pes.length===0) return;
      var rev = pes.reduce(function(s,e){ return s+entryFinance(e).revenue; },0);
      var cost = pes.reduce(function(s,e){ return s+entryFinance(e).totalCost; },0);
      var kg = pes.reduce(function(s,e){ return s+e.grams/1000; },0);
      var margin = rev-cost;
      productBreakdown.push({ label:ch.label+" "+fmt.label, icon:ch.icon+" "+fmt.icon, count:pes.length, rev, cost, margin, kg, marginPct:rev>0?(margin/rev)*100:0 });
    });
  });

  // Top clients
  var clientMap = {};
  filtered.forEach(function(e){
    var k=e.client||"Unknown";
    if(!clientMap[k]) clientMap[k]={client:k,revenue:0,orders:0,kg:0};
    var f=entryFinance(e);
    clientMap[k].revenue+=f.revenue;
    clientMap[k].orders++;
    clientMap[k].kg+=e.grams/1000;
  });
  var topClients = Object.values(clientMap).sort(function(a,b){ return b.revenue-a.revenue; }).slice(0,8);

  // Monthly trend (last 12 months)
  var monthlyMap = {};
  filtered.forEach(function(e){
    var d=new Date(e.id);
    var key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    if(!monthlyMap[key]) monthlyMap[key]={month:key,revenue:0,cost:0,kg:0};
    var f=entryFinance(e);
    monthlyMap[key].revenue+=f.revenue;
    monthlyMap[key].cost+=f.totalCost;
    monthlyMap[key].kg+=e.grams/1000;
  });
  var monthlyTrend = Object.values(monthlyMap).sort(function(a,b){ return a.month>b.month?1:-1; }).slice(-12);

  // Bean cost breakdown
  var beanCostMap = {};
  filtered.forEach(function(e){
    var k=e.beanOrigin||"Unknown";
    if(!beanCostMap[k]) beanCostMap[k]={origin:k,cost:0,kg:0,wasteCost:0};
    var f=entryFinance(e);
    beanCostMap[k].cost+=f.greenCost;
    beanCostMap[k].kg+=e.greenNeeded/1000;
    beanCostMap[k].wasteCost+=f.wasteCost;
  });
  var beanCosts = Object.values(beanCostMap).sort(function(a,b){ return b.cost-a.cost; });

  function fmt$(n){ return "$"+(n||0).toFixed(2); }
  function fmtPct(n){ return (n||0).toFixed(1)+"%"; }

  var BAR_COLORS=["#D95035","#2563eb","#16a34a","#7c3aed","#d97706","#0891b2","#db2777","#65a30d"];

  // Simple bar chart
  function BarChart({ data, valueKey, labelKey, colorFn, fmt }){
    var max = Math.max.apply(null, data.map(function(d){ return d[valueKey]||0; }));
    if(max<=0) return null;
    return (
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {data.map(function(d,i){
          var val=d[valueKey]||0;
          var pct=max>0?(val/max)*100:0;
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:"0 0 100px",fontSize:11,color:C.espresso,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d[labelKey]}</div>
              <div style={{flex:1,height:18,background:"rgba(0,0,0,0.06)",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:colorFn?colorFn(i):BAR_COLORS[i%BAR_COLORS.length],borderRadius:4,transition:"width 0.4s"}}/>
              </div>
              <div style={{flex:"0 0 70px",fontSize:11,fontWeight:700,color:C.espresso,textAlign:"right"}}>{fmt?fmt(val):val}</div>
            </div>
          );
        })}
      </div>
    );
  }

  // Revenue trend sparkline using SVG
  function SparkLine({ data }){
    if(!data||data.length<2) return <div style={{fontSize:11,color:C.mocha,fontStyle:"italic"}}>Not enough data yet</div>;
    var vals=data.map(function(d){ return d.revenue; });
    var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
    var range=max-min||1;
    var w=300,h=60,pad=4;
    var pts=vals.map(function(v,i){
      var x=pad+(i/(vals.length-1))*(w-pad*2);
      var y=pad+(1-(v-min)/range)*(h-pad*2);
      return x+","+y;
    }).join(" ");
    return (
      <div>
        <svg width="100%" viewBox={"0 0 "+w+" "+h} style={{overflow:"visible"}}>
          <polyline fill="none" stroke={C.red} strokeWidth="2.5" strokeLinejoin="round" points={pts}/>
          {vals.map(function(v,i){
            var x=pad+(i/(vals.length-1))*(w-pad*2);
            var y=pad+(1-(v-min)/range)*(h-pad*2);
            return <circle key={i} cx={x} cy={y} r="3" fill={C.red}/>;
          })}
        </svg>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.mocha,marginTop:2}}>
          {data.map(function(d){ return <span key={d.month}>{d.month.split("-")[1]+"/"+d.month.split("-")[0].slice(2)}</span>; })}
        </div>
      </div>
    );
  }

  var SL2 = function(p){ return <div style={{fontSize:10,letterSpacing:2,color:C.mocha,textTransform:"uppercase",marginBottom:6}}>{p.children}</div>; };

  function exportFinanceCSV(){
    var NL=String.fromCharCode(10);
    var rows=[["Date","Client","Channel","Format","Weight(kg)","Revenue($)","Cost($)","Profit($)","Margin%","Bean Origin","Notes"]];
    filtered.forEach(function(e){
      var f=entryFinance(e);
      var ch=CHANNELS.find(function(c){ return c.id===(e.channel||"retail"); })||CHANNELS[0];
      function q(v){ return '"'+String(v||"").replace(/"/g,'""')+'"'; }
      rows.push([
        new Date(e.id).toLocaleDateString(),
        q(e.client), q(ch.label), q(e.format),
        (e.grams/1000).toFixed(3),
        f.revenue.toFixed(2), f.totalCost.toFixed(2),
        f.margin.toFixed(2), f.marginPct.toFixed(1),
        q(e.beanOrigin), q(e.orderNote),
      ]);
    });
    var csv=rows.map(function(r){ return r.join(","); }).join(NL);
    var a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download="untamed-finance-"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
  }


  // Section open/close state
  var so = useState({breakdown:false,trend:false,beans:false,entries:false});
  var sectOpen=so[0]; var setSectOpen=so[1];
  function toggleSect(k){ setSectOpen(function(p){ var n=Object.assign({},p); n[k]=!n[k]; return n; }); }

  function Section({ id, title, badge, children }){
    var open = sectOpen[id];
    return (
      <div style={{border:"1.5px solid "+C.tan,borderRadius:12,overflow:"hidden",marginBottom:10}}>
        <div onClick={function(){ toggleSect(id); }}
          style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",cursor:"pointer",background:open?C.espresso:"rgba(255,255,255,0.9)",transition:"background 0.2s"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,fontWeight:700,color:open?C.cream:C.espresso,fontFamily:"Georgia,serif"}}>{title}</span>
            {badge&&<span style={{fontSize:10,color:open?C.tan:C.mocha,background:open?"rgba(255,255,255,0.12)":C.cream,border:"1px solid "+(open?"rgba(255,255,255,0.2)":C.tan),borderRadius:8,padding:"1px 7px"}}>{badge}</span>}
          </div>
          <span style={{fontSize:12,color:open?C.tan:C.mocha}}>{open?"▲":"▼"}</span>
        </div>
        {open&&<div style={{background:"rgba(255,255,255,0.95)",padding:"14px 16px"}}>{children}</div>}
      </div>
    );
  }

  return (
    <div style={{maxWidth:900,margin:"0 auto",padding:"16px 14px",width:"100%",boxSizing:"border-box"}}>

      {filtered.length===0&&(
        <div style={{textAlign:"center",padding:"64px 0",color:C.mocha}}>
          <div style={{fontSize:48,marginBottom:12}}>💰</div>
          <div style={{fontSize:14,fontStyle:"italic"}}>{log.length===0?"No orders logged yet. Start roasting!":"No entries match your filters."}</div>
        </div>
      )}

      {filtered.length>0&&(
        <div>

          
          <div style={{background:C.espresso,borderRadius:16,padding:"20px 22px",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
              <div style={{fontSize:11,color:C.tan,letterSpacing:2,textTransform:"uppercase"}}>Financial Summary</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <input type="date" value={dateFrom} onChange={function(e){ setDateFrom(e.target.value); }}
                  style={{border:"1px solid rgba(240,228,204,0.25)",borderRadius:7,padding:"4px 9px",fontFamily:"Georgia,serif",fontSize:11,color:C.cream,background:"rgba(255,255,255,0.08)",outline:"none"}}/>
                <span style={{fontSize:11,color:C.tan,alignSelf:"center"}}>→</span>
                <input type="date" value={dateTo} onChange={function(e){ setDateTo(e.target.value); }}
                  style={{border:"1px solid rgba(240,228,204,0.25)",borderRadius:7,padding:"4px 9px",fontFamily:"Georgia,serif",fontSize:11,color:C.cream,background:"rgba(255,255,255,0.08)",outline:"none"}}/>
                <select value={channelFilter} onChange={function(e){ setChannelFilter(e.target.value); }}
                  style={{border:"1px solid rgba(240,228,204,0.25)",borderRadius:7,padding:"4px 9px",fontFamily:"Georgia,serif",fontSize:11,color:C.cream,background:"rgba(255,255,255,0.08)",outline:"none"}}>
                  <option value="all">All Channels</option>
                  {CHANNELS.map(function(c){ return <option key={c.id} value={c.id}>{c.label}</option>; })}
                </select>
                {(dateFrom||dateTo||channelFilter!=="all")&&(
                  <button onClick={function(){ setDateFrom(""); setDateTo(""); setChannelFilter("all"); }}
                    style={{border:"1px solid rgba(240,228,204,0.25)",borderRadius:7,padding:"4px 9px",fontFamily:"Georgia,serif",fontSize:11,color:C.tan,background:"transparent",cursor:"pointer"}}>
                    Clear
                  </button>
                )}
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:2,marginBottom:16}}>
              {[
                {l:"Revenue",v:fmt$(totals.revenue),color:C.cream,sub:totals.entries+" orders · "+totals.kg.toFixed(1)+"kg"},
                {l:"Cost",v:fmt$(totals.cost),color:C.peach,sub:"green beans + wastage"},
                {l:"Profit",v:fmt$(totals.margin),color:totals.margin>=0?"#86efac":"#fca5a5",sub:fmtPct(overallMarginPct)+" margin"},
              ].map(function(card){ return (
                <div key={card.l} style={{textAlign:"center",padding:"10px 6px"}}>
                  <div style={{fontSize:9,color:C.tan,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>{card.l}</div>
                  <div style={{fontSize:26,fontWeight:900,color:card.color,fontFamily:"Georgia,serif",lineHeight:1}}>{card.v}</div>
                  <div style={{fontSize:10,color:"#a87c6a",marginTop:4}}>{card.sub}</div>
                </div>
              ); })}
            </div>

            <div style={{background:"rgba(0,0,0,0.2)",borderRadius:8,overflow:"hidden",marginBottom:6}}>
              <div style={{height:10,width:Math.min(overallMarginPct,100)+"%",background:overallMarginPct>=60?"#86efac":overallMarginPct>=35?"#fbbf24":"#fca5a5",borderRadius:8,transition:"width 0.6s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#a87c6a"}}>
              <span>0%</span>
              <span>33% Flavor</span>
              <span>40% Wholesale</span>
              <span>75% Retail</span>
              <span>100%</span>
            </div>
          </div>

          
          {channelBreakdown.length>0&&(
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              {channelBreakdown.map(function(ch,i){
                var clr=BAR_COLORS[i%BAR_COLORS.length];
                return (
                  <div key={ch.id} style={{flex:"1 1 120px",background:"rgba(255,255,255,0.9)",border:"1.5px solid "+C.tan,borderRadius:10,padding:"10px 14px"}}>
                    <div style={{fontSize:11,color:C.mocha,marginBottom:2}}>{ch.icon} {ch.label}</div>
                    <div style={{fontSize:20,fontWeight:900,color:clr,fontFamily:"Georgia,serif"}}>{fmt$(ch.rev)}</div>
                    <div style={{fontSize:10,color:C.mocha}}>{fmtPct(ch.marginPct)} margin · {ch.kg.toFixed(1)}kg · {ch.orders} orders</div>
                  </div>
                );
              })}
            </div>
          )}

          
          <Section id="breakdown" title="Revenue Breakdown" badge={channelBreakdown.length+" channels"}>
            {channelBreakdown.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,color:C.mocha,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>By Channel</div>
                <BarChart data={channelBreakdown} valueKey="rev" labelKey="label" fmt={fmt$}/>
              </div>
            )}
            {productBreakdown.length>0&&(
              <div>
                <div style={{fontSize:10,color:C.mocha,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>By Product Type</div>
                <BarChart data={productBreakdown} valueKey="rev" labelKey="label" fmt={fmt$}/>
                <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:6}}>
                  {productBreakdown.map(function(p,i){ return (
                    <div key={p.label} style={{background:C.cream,border:"1px solid "+C.tan,borderRadius:8,padding:"5px 10px",fontSize:10}}>
                      <span style={{color:BAR_COLORS[i%BAR_COLORS.length],fontWeight:700}}>{p.label}</span>
                      <span style={{color:C.mocha}}> · {p.count} orders · {fmtPct(p.marginPct)} margin</span>
                    </div>
                  ); })}
                </div>
              </div>
            )}
          </Section>

          <Section id="beans" title="Bean & Cost Breakdown" badge={beanCosts.length+" origins"}>
            {topClients.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,color:C.mocha,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Top Clients by Revenue</div>
                <BarChart data={topClients} valueKey="revenue" labelKey="client" fmt={fmt$}/>
              </div>
            )}
            {beanCosts.length>0&&(
              <div>
                <div style={{fontSize:10,color:C.mocha,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Green Bean Cost by Origin</div>
                <BarChart data={beanCosts} valueKey="cost" labelKey="origin" fmt={fmt$}/>
                <div style={{marginTop:8,fontSize:11,color:C.mocha}}>
                  Total wastage: <b style={{color:"#dc2626"}}>{fmt$(totals.wasteCost)}</b>
                  <span style={{color:C.tan}}> ({totals.kg>0?((totals.wasteCost/totals.cost)*100).toFixed(1):0}% of cost)</span>
                </div>
              </div>
            )}
          </Section>

          {monthlyTrend.length>=2&&(
            <Section id="trend" title="Monthly Revenue Trend" badge={monthlyTrend.length+" months"}>
              <SparkLine data={monthlyTrend}/>
              <div style={{display:"flex",gap:14,marginTop:10,flexWrap:"wrap"}}>
                <div style={{fontSize:11,color:C.mocha}}>Best: <b style={{color:C.red}}>{monthlyTrend.reduce(function(a,b){ return b.revenue>a.revenue?b:a; }).month} · {fmt$(Math.max.apply(null,monthlyTrend.map(function(m){ return m.revenue; })))}</b></div>
                <div style={{fontSize:11,color:C.mocha}}>Avg/month: <b style={{color:C.espresso}}>{fmt$(totals.revenue/monthlyTrend.length)}</b></div>
              </div>
            </Section>
          )}

          <Section id="entries" title={"All Entries"} badge={filtered.length+" orders"}>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <select value={sortBy} onChange={function(e){ setSortBy(e.target.value); }}
                style={{border:"1.5px solid "+C.tan,borderRadius:8,padding:"5px 10px",fontFamily:"Georgia,serif",fontSize:11,color:C.dark,background:C.white,outline:"none"}}>
                <option value="date-desc">Newest First</option>
                <option value="date-asc">Oldest First</option>
                <option value="revenue-desc">Highest Revenue</option>
                <option value="margin-desc">Highest Margin</option>
                <option value="weight-desc">Most Volume</option>
              </select>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"Georgia,serif"}}>
                <thead>
                  <tr style={{background:C.espresso,color:C.cream}}>
                    {["Date","Client","Channel","Weight","Revenue","Cost","Profit","Margin %"].map(function(h){ return (
                      <th key={h} style={{padding:"7px 10px",textAlign:"left",fontWeight:700,fontSize:10,letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                    ); })}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(function(e,i){
                    var f=entryFinance(e);
                    var ch=CHANNELS.find(function(c){ return c.id===(e.channel||"retail"); })||CHANNELS[0];
                    var hasRev = f.revenue>0;
                    return (
                      <tr key={e.id} style={{background:i%2===0?"transparent":C.cream+"88",borderBottom:"1px solid "+C.tan+"50"}}>
                        <td style={{padding:"8px 10px",color:C.mocha,whiteSpace:"nowrap"}}>{new Date(e.id).toLocaleDateString("en-CA",{month:"short",day:"numeric"})}</td>
                        <td style={{padding:"8px 10px",fontWeight:700,color:C.espresso,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.client||"—"}</td>
                        <td style={{padding:"8px 10px"}}>
                          <span style={{fontSize:10,padding:"2px 7px",borderRadius:8,background:(e.channel==="retail"?"#D9503520":e.channel==="wholesale"?"#2563eb20":"#7c3aed20"),color:(e.channel==="retail"?"#D95035":e.channel==="wholesale"?"#2563eb":"#7c3aed"),fontWeight:700}}>{ch.label}</span>
                        </td>
                        <td style={{padding:"8px 10px",color:C.mocha}}>{(e.grams/1000).toFixed(2)}kg</td>
                        <td style={{padding:"8px 10px",fontWeight:700,color:hasRev?C.green:C.tan}}>{hasRev?fmt$(f.revenue):"—"}</td>
                        <td style={{padding:"8px 10px",color:f.totalCost>0?C.espresso:C.tan}}>{f.totalCost>0?fmt$(f.totalCost):"—"}</td>
                        <td style={{padding:"8px 10px",fontWeight:700,color:f.margin>0?C.green:f.margin<0?"#dc2626":C.tan}}>{hasRev?(f.margin>=0?"+":"")+fmt$(f.margin):"—"}</td>
                        <td style={{padding:"8px 10px",fontWeight:700,color:f.marginPct>=60?C.green:f.marginPct>=35?"#d97706":"#dc2626"}}>{hasRev?fmtPct(f.marginPct):"—"}</td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{background:C.espresso,color:C.cream,fontWeight:700}}>
                    <td colSpan={3} style={{padding:"8px 10px",fontSize:11}}>TOTAL ({filtered.length} orders)</td>
                    <td style={{padding:"8px 10px"}}>{totals.kg.toFixed(2)}kg</td>
                    <td style={{padding:"8px 10px",color:"#86efac"}}>{fmt$(totals.revenue)}</td>
                    <td style={{padding:"8px 10px",color:C.peach}}>{fmt$(totals.cost)}</td>
                    <td style={{padding:"8px 10px",color:totals.margin>=0?"#86efac":"#fca5a5"}}>{totals.margin>=0?"+":""}{fmt$(totals.margin)}</td>
                    <td style={{padding:"8px 10px",color:overallMarginPct>=60?"#86efac":overallMarginPct>=35?"#fbbf24":"#fca5a5"}}>{fmtPct(overallMarginPct)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </Section>

          <button onClick={exportFinanceCSV}
            style={{width:"100%",padding:"13px",background:C.espresso,color:C.cream,border:"none",borderRadius:12,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,letterSpacing:1,marginTop:4}}>
            ↓ Export Finance Report (CSV)
          </button>

        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════
function RoastCalc(){
  var useState = React.useState;
  var useEffect = React.useEffect;
  var C = {cream:"#F0E4CC",red:"#D95035",dark:"#0C0C0C",tan:"#D1BA9B",mocha:"#997C6F",espresso:"#47322F",white:"#FFFFFF",peach:"#E3A88E"};

  var logS=useState([]); var log=logS[0]; var setLog=logS[1];
  var schedS=useState([]); var schedule=schedS[0]; var setSchedule=schedS[1];
  var invS=useState([]); var inventory=invS[0]; var setInventory=invS[1];
  var costsS=useState({greenCostPerKg:0,laborPerHour:0,packagingPerUnit:0}); var costs=costsS[0]; var setCosts=costsS[1];
  var bcS=useState([]); var beanCatalog=bcS[0]; var setBeanCatalog=bcS[1];
  var piS=useState([]); var packagingInv=piS[0]; var setPackagingInv=piS[1];
  var srS=useState(false); var storageReady=srS[0]; var setStorageReady=srS[1];

  useEffect(function(){
    var db = window.__db;
    var keys = [
      ["log",setLog],["schedule",setSchedule],["inventory",setInventory],
      ["costs",setCosts],["beanCatalog",setBeanCatalog],["packagingInv",setPackagingInv]
    ];
    Promise.all(keys.map(function(pair){ return db.collection("untamed-roastery").doc(pair[0]).get(); }))
      .then(function(snaps){
        snaps.forEach(function(snap,i){ if(snap.exists&&snap.data()&&snap.data().value!=null) keys[i][1](snap.data().value); });
        setStorageReady(true);
      }).catch(function(){ setStorageReady(true); });
    var unsubs = keys.map(function(pair){
      return db.collection("untamed-roastery").doc(pair[0]).onSnapshot(function(snap){
        if(snap.exists&&snap.data()&&snap.data().value!=null) pair[1](snap.data().value);
      });
    });
    return function(){ unsubs.forEach(function(u){ u(); }); };
  },[]);

  function fbSet(key,value){ if(!storageReady||!window.__db)return; window.__db.collection("untamed-roastery").doc(key).set({value:value}).catch(function(){}); }
  useEffect(function(){ if(!storageReady)return; fbSet("log",log); },[log,storageReady]);
  useEffect(function(){ if(!storageReady)return; fbSet("schedule",schedule); },[schedule,storageReady]);
  useEffect(function(){ if(!storageReady)return; fbSet("inventory",inventory); },[inventory,storageReady]);
  useEffect(function(){ if(!storageReady)return; fbSet("costs",costs); },[costs,storageReady]);
  useEffect(function(){ if(!storageReady)return; fbSet("beanCatalog",beanCatalog); },[beanCatalog,storageReady]);
  useEffect(function(){ if(!storageReady)return; fbSet("packagingInv",packagingInv); },[packagingInv,storageReady]);

  var tabS=useState("calc"); var activeTab=tabS[0]; var setActiveTab=tabS[1];
  var modeS=useState("single"); var calcMode=modeS[0]; var setCalcMode=modeS[1];
  var orderS=useState({client:"",grams:"",unit:"g",roastLevel:"medium",format:"whole",slots:[],channel:"retail",marginPct:75});
  var order=orderS[0]; var setOrder=orderS[1];
  function setOrderField(f,v){ setOrder(function(p){ return Object.assign({},p,{[f]:v}); }); }
  var rnS=useState({}); var roundNotes=rnS[0]; var setRoundNotes=rnS[1];
  var rsS=useState({}); var roundStates=rsS[0]; var setRoundStates=rsS[1];
  var tracksS=useState(null); var tracks=tracksS[0]; var setTracks=tracksS[1];
  var snS=useState(""); var sessionName=snS[0]; var setSessionName=snS[1];
  var gtS=useState(0); var globalTimer=gtS[0]; var setGlobalTimer=gtS[1];
  var grS=useState(false); var sessionRunning=grS[0]; var setSessionRunning=grS[1];
  var stS=useState([]); var savedTrackIds=stS[0]; var setSavedTrackIds=stS[1];
  var lsS=useState(""); var logSearch=lsS[0]; var setLogSearch=lsS[1];
  var lsfS=useState("all"); var logStatusFilter=lsfS[0]; var setLogStatusFilter=lsfS[1];

  function saveSession(entries){ setLog(function(p){ return [].concat(entries,p); }); }
  function deleteEntry(id){ setLog(function(p){ return p.filter(function(e){ return e.id!==id; }); }); }
  function updateEntry(updated){ setLog(function(p){ return p.map(function(e){ return e.id===updated.id?updated:e; }); }); }
  function updateStatus(id,status){ setLog(function(p){ return p.map(function(e){ return e.id===id?Object.assign({},e,{status:status}):e; }); }); }
  function toggleRoundSingle(i){ setRoundStates(function(p){ var n=Object.assign({},p); if(n[i]) delete n[i]; else n[i]=true; return n; }); }
  function setNote(i,v){ setRoundNotes(function(p){ var n=Object.assign({},p); n[i]=v; return n; }); }

  var filteredLog = log.filter(function(e){
    var q=logSearch.toLowerCase();
    var matchQ=!q||(e.client||"").toLowerCase().includes(q)||(e.machines||"").toLowerCase().includes(q)||(e.beanOrigin||"").toLowerCase().includes(q);
    var matchS=logStatusFilter==="all"||(e.status||"pending")===logStatusFilter;
    return matchQ&&matchS;
  });

  var STATUS_OPTIONS_NAV=[{id:"all",label:"All statuses"}].concat(STATUS_OPTIONS);
  var tabs=[
    {id:"calc",label:"Calculator",icon:"⚙️"},
    {id:"log",label:"Order Log ("+log.length+")",icon:"📋"},
    {id:"calendar",label:"Calendar",icon:"📅"},
    {id:"inventory",label:"Inventory ("+(inventory.length)+")",icon:"🌱"},
    {id:"finance",label:"Finance",icon:"💰"},
  ];

  return (
    <div style={{minHeight:"100vh",background:C.cream,fontFamily:"Georgia,serif"}}>
      <div style={{background:C.dark,padding:"10px 16px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1040,margin:"0 auto",display:"flex",alignItems:"center",gap:0,overflowX:"auto"}}>
          <div style={{fontSize:14,fontWeight:700,color:C.cream,fontFamily:"Georgia,serif",whiteSpace:"nowrap",marginRight:16,flexShrink:0}}>
            <span style={{color:C.red}}>☕</span> Untamed Roastery
          </div>
          <div style={{display:"flex",gap:4,flexShrink:0}}>
            {tabs.map(function(t){
              var active=activeTab===t.id;
              return (
                <button key={t.id} onClick={function(){ setActiveTab(t.id); }}
                  style={{padding:"6px 12px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:12,fontWeight:active?700:400,background:active?C.red:"transparent",color:active?C.cream:C.mocha,whiteSpace:"nowrap",transition:"all 0.15s"}}>
                  {t.icon} {t.label}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1040,margin:"0 auto",padding:"16px 14px",width:"100%",boxSizing:"border-box"}}>

        {activeTab==="calc"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <div onClick={function(){ setCalcMode("single"); }} style={{border:"2px solid "+(calcMode==="single"?C.red:C.tan),borderRadius:12,padding:"12px 16px",cursor:"pointer",background:calcMode==="single"?"rgba(217,80,53,0.06)":"rgba(255,255,255,0.7)"}}>
                <div style={{fontSize:18,marginBottom:4}}>⚙️</div>
                <div style={{fontWeight:700,color:calcMode==="single"?C.red:C.espresso,fontSize:14}}>Single Order</div>
                <div style={{fontSize:11,color:C.mocha}}>One bean, one or more machines</div>
              </div>
              <div onClick={function(){ setCalcMode("multi"); }} style={{border:"2px solid "+(calcMode==="multi"?C.red:C.tan),borderRadius:12,padding:"12px 16px",cursor:"pointer",background:calcMode==="multi"?"rgba(217,80,53,0.06)":"rgba(255,255,255,0.7)"}}>
                <div style={{fontSize:18,marginBottom:4}}>⚡</div>
                <div style={{fontWeight:700,color:calcMode==="multi"?C.red:C.espresso,fontSize:14}}>Multi-Track</div>
                <div style={{fontSize:11,color:C.mocha}}>Multiple beans and machines at once</div>
              </div>
            </div>

            {calcMode==="single"&&(
              <SingleOrderCalc
                order={order} setOrderField={setOrderField}
                inventory={inventory}
                roundStates={roundStates} roundNotes={roundNotes}
                toggleRound={toggleRoundSingle} setNote={setNote}
                onSave={function(entry){
                  saveSession([entry]);
                  setActiveTab("log");
                  setRoundStates({});
                  setRoundNotes({});
                }}
              />
            )}

            {calcMode==="multi"&&(
              <MultiTrackSession
                inventory={inventory}
                onSaveSession={saveSession}
                persistedTracks={tracks}
                onTracksChange={setTracks}
                sessionName={sessionName}
                onSessionNameChange={setSessionName}
                globalTimer={globalTimer}
                onTimerChange={setGlobalTimer}
                sessionRunning={sessionRunning}
                onSessionRunningChange={setSessionRunning}
                savedTrackIds={savedTrackIds}
                onSavedTrackIdsChange={setSavedTrackIds}
              />
            )}
          </div>
        )}

        {activeTab==="log"&&(
          <div>
            <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              <input value={logSearch} onChange={function(e){ setLogSearch(e.target.value); }} placeholder="Search client or machine..."
                style={{flex:1,minWidth:180,border:"1.5px solid "+C.tan,borderRadius:10,padding:"9px 14px",fontFamily:"Georgia,serif",fontSize:13,color:C.dark,background:"rgba(255,255,255,0.9)",outline:"none"}}/>
              <select value={logStatusFilter} onChange={function(e){ setLogStatusFilter(e.target.value); }}
                style={{border:"1.5px solid "+C.tan,borderRadius:10,padding:"9px 12px",fontFamily:"Georgia,serif",fontSize:12,color:C.dark,background:"rgba(255,255,255,0.9)",outline:"none"}}>
                {STATUS_OPTIONS_NAV.map(function(s){ return <option key={s.id} value={s.id}>{s.label}</option>; })}
              </select>
              <button onClick={function(){
                var NL=String.fromCharCode(10);
                var H=["Date","Client","Channel","Format","Roast Level","Weight (kg)","Machines","Revenue ($)","Cost ($)","Profit ($)","Margin %","Bean Origin","Status","Notes"];
                var rows=[H];
                filteredLog.forEach(function(e){
                  function q(v){ return '"'+String(v||"").replace(/"/g,'""')+'"'; }
                  var rev=(e.sellPricePerKg||0)*(e.grams/1000);
                  rows.push([
                    new Date(e.id).toLocaleDateString(),q(e.client||""),
                    q((CHANNELS.find(function(c){ return c.id===(e.channel||"retail"); })||CHANNELS[0]).label),
                    q(e.format||""),q(e.level||""),((e.grams||0)/1000).toFixed(3),
                    q(e.machines||""),rev.toFixed(2),(e.totalCost||0).toFixed(2),
                    (rev-(e.totalCost||0)).toFixed(2),
                    rev>0?((rev-(e.totalCost||0))/rev*100).toFixed(1)+"":"",
                    q(e.beanOrigin||""),q(e.status||""),q(e.orderNote||"")
                  ]);
                });
                var csv=rows.map(function(r){ return r.join(","); }).join(NL);
                var a=document.createElement("a");
                a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
                a.download="untamed-order-log-"+new Date().toISOString().slice(0,10)+".csv";
                a.click();
              }} style={{background:C.espresso,color:C.cream,border:"none",borderRadius:10,padding:"9px 16px",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
                ↓ Export CSV
              </button>
            </div>
            {filteredLog.length===0?(
              <div style={{textAlign:"center",padding:"48px 0",color:C.mocha}}>
                <div style={{fontSize:40,marginBottom:10}}>📋</div>
                <div style={{fontStyle:"italic"}}>{log.length===0?"No orders yet. Calculate your first roast!":"No results match your search."}</div>
              </div>
            ):(
              filteredLog.map(function(entry){
                return (
                  <LogEntryCard key={entry.id} entry={entry}
                    onDelete={deleteEntry}
                    onStatusChange={function(s){ updateStatus(entry.id,s); }}
                    onNoteChange={updateEntry}
                  />
                );
              })
            )}
          </div>
        )}

        {activeTab==="calendar"&&(
          <CalendarTab log={log} schedule={schedule} onScheduleChange={setSchedule}/>
        )}

        {activeTab==="inventory"&&(
          <InventoryTab inventory={inventory} setInventory={setInventory} log={log} beanCatalog={beanCatalog} setBeanCatalog={setBeanCatalog} packagingInv={packagingInv} setPackagingInv={setPackagingInv}/>
        )}

        {activeTab==="finance"&&(
          <FinanceTab log={log} inventory={inventory}/>
        )}

      </div>
    </div>
  );
}

  </script>
  <script>
    var s=document.getElementById('app-source').textContent;
    var t=Babel.transform(s,{presets:['react'],sourceType:'script'}).code;
    var useState=React.useState;var useEffect=React.useEffect;
    eval(t);
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RoastCalc,null));
    setTimeout(function(){document.getElementById('sdot').classList.remove('pulse');document.getElementById('slabel').textContent='Live sync ✓';},2500);
  </script>
</body>
